        function handleBigClockClick() {
            if (typeof noSleep !== 'undefined') {
                noSleep.enable().catch(e => console.log("WakeLock chyba:", e));
            }

            if (document.body.classList.contains('full-night-mode')) {
                manualnaNocAktivna = false;
                nocnyRezimSnoozeDo = Date.now() + (cfgSnoozeMin * 60 * 1000);
                document.body.classList.remove('full-night-mode');
            } else {
                manualnaNocAktivna = true;
                runClockEngine();
            }
        }

        function runClockEngine() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            
            skontrolujAObnovMeniny();
            
            const aktCasString = `${h}:${m}`;
            document.getElementById('bigHours').textContent = h;
            document.getElementById('bigMinutes').textContent = m;
            
            const dniDlhe = ['Nedeľa', 'Pondelok', 'Utorok', 'Streda', 'Štvrtok', 'Piatok', 'Sobota'];
            const aktDatumString = `${now.getDate()}.${now.getMonth() + 1}.`;
            const aktFullDateString = `${dniDlhe[now.getDay()]} ${now.getDate()}.${now.getMonth() + 1}.${now.getFullYear()}`;
            
            const bigDateEl = document.getElementById('bigDate');
            if(bigDateEl) bigDateEl.textContent = aktFullDateString;

            const topDateEl = document.getElementById('weather-location-date');
            const topTimeEl = document.getElementById('weather-location-time');
            if (topDateEl) topDateEl.textContent = aktDatumString;
            if (topTimeEl) topTimeEl.textContent = aktCasString;

            const aktualnyCasVMinutach = now.getHours() * 60 + now.getMinutes();
            const terazMili = Date.now();

            const [odH, odM] = cfgNocOd.split(':').map(Number);
            const [doH, doM] = cfgNocDo.split(':').map(Number);
            const [casOd, casDo] = [odH * 60 + odM, doH * 60 + doM];

            let jeNocnyCas = (casOd > casDo) 
                ? (aktualnyCasVMinutach >= casOd || aktualnyCasVMinutach < casDo)
                : (aktualnyCasVMinutach >= casOd && aktualnyCasVMinutach < casDo);

            const bodyEl = document.getElementById('mainBody');
            const bottomInfoEl = document.getElementById('nightBottomInfo');

            if ((jeNocnyCas || manualnaNocAktivna) && terazMili > nocnyRezimSnoozeDo && !isSettingsModeActive) {
                bodyEl.classList.add('full-night-mode');
                
            // Pôvodný riadok: let meninyNocturnalText = dnesneMeno ? `${dnesneMeno}    •    ` : "";
            // NOVÝ RIADOK:
            let meninyNocturnalText = "";
            if (dnesneMeno) {
                // Ak máme v poli viac mien, pridáme k menu "+X" aj pre nočný režim
                const extraMena = (dnesneVsetkyMena.length > 1) ? ` +${dnesneVsetkyMena.length - 1}` : "";
                meninyNocturnalText = `${dnesneMeno}${extraMena}    •    `;
            }
                
                if (bottomInfoEl) {
                    const lenCisloTeploty = parseInt(aktualnaTeplotaText.replace(/[^0-9.-]/g, '')) || 0;
                    const tColorNoc = getTempColor(lenCisloTeploty);
                    const ikonkaW = aktualnaTeplotaText.split(' ')[0] || "☀️";

                    bottomInfoEl.innerHTML = `${meninyNocturnalText}${dniDlhe[now.getDay()]} ${now.getDate()}.${now.getMonth() + 1.}    •    ${ikonkaW} <span style="color: ${tColorNoc}; font-weight: 700;">${lenCisloTeploty}°C</span>`;
                }
            } else {
                bodyEl.classList.remove('full-night-mode');
                if (!jeNocnyCas) manualnaNocAktivna = false;
            }
            
            let stavRadia = "Rádio";
            if (currentPlayingType && currentPlayingType !== "") {
                const hrajuceRadio = DATABASE.find(d => d.id === currentPlayingType);
                stavRadia = hrajuceRadio ? hrajuceRadio.name : currentPlayingType.toUpperCase();
            }
            
            document.title = `${aktualnaTeplotaText} | ${stavRadia}`;
        }

        // Globálna premenná, kde si uložíme kompletný zoznam mien pre daný deň
        let dnesneVsetkyMena = [];
        let poslednyNacitanyDen = -1;

        function skontrolujAObnovMeniny() {
            const dnes = new Date().getDate();
            if (dnes !== poslednyNacitanyDen) {
                poslednyNacitanyDen = dnes;
                fetchNamedayData();
            }
        }

        async function fetchNamedayData() {
            const now = new Date();
            poslednyNacitanyDen = now.getDate();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            try {
                const response = await fetch('https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv');
                const text = await response.text();
                for (let line of text.split('\n')) {
                    if (line.includes(`${mm}-${dd}`)) {
                        // Rozdelíme riadok: na indexe 0 je dátum, na indexe 1 sú mená oddelené čiarkami
                        let rawNamesLine = line.split(/[;,]/).slice(1).join(',');
                        // Vyčistíme mená od prázdnych znakov a rozdelíme ich do poľa
                        dnesneVsetkyMena = rawNamesLine.split(',').map(m => m.trim()).filter(m => m !== "");

                        if (dnesneVsetkyMena.length === 0) return;

                        // Hlavné meno bude prvé v poradí
                        let povodneMeno = dnesneVsetkyMena[0];
                        dnesneMeno = povodneMeno; 
                        
                        const bigNameday = document.getElementById('bigNameday');
                        const sep = document.getElementById('dateSeparator');
                        
                        if(sep) sep.style.display = "inline";
                        bigNameday.style.color = "#ff9f0a";

                        // Priradenie ikoniek podľa tvojich kategórií
                        if (RODINA.includes(povodneMeno)) {
                            dnesneMeno = `❤️ ${povodneMeno}`;
                            bigNameday.style.color = "#ff3b30";
                        } else if (MOJE_MENA.includes(povodneMeno)) {
                            dnesneMeno = `⭐ ${povodneMeno}`;
                        } else if (SPOLUZIACI.includes(povodneMeno)) {
                            dnesneMeno = `🎓 ${povodneMeno}`;
                            bigNameday.style.color = "#5ac8fa";
                        } else if (KOLEGOVIA.includes(povodneMeno)) {
                            dnesneMeno = `💼 ${povodneMeno}`;
                            bigNameday.style.color = "#34c759";
                        }

                        // Ak existujú ďalšie mená, pridáme indikátor +X (napr. +2)
                        if (dnesneVsetkyMena.length > 1) {
                            const pocetDalsich = dnesneVsetkyMena.length - 1;
                            bigNameday.innerHTML = `${dnesneMeno} <span style="color: #666; font-size: 0.8em; font-weight: normal; margin-left: 4px;">+${pocetDalsich}</span>`;
                        } else {
                            bigNameday.textContent = dnesneMeno;
                        }

                        // Nastavíme kliknutie na zobrazenie vyskakovacieho okna
                        bigNameday.style.cursor = 'pointer';
                        bigNameday.onclick = (event) => {
                            event.stopPropagation(); // zabráni spusteniu iných kliknutí (napr. nočného režimu)
                            otvorOknoMien();
                        };

                        break;
                    }
                }
            } catch (e) {
                const sep = document.getElementById('dateSeparator');
                if(sep) sep.style.display = "none";
            }
        }

        // Pomocná funkcia, ktorá naplní a zobrazí vyskakovacie okno
        function otvorOknoMien() {
            const modal = document.getElementById('namesModal');
            const listContainer = document.getElementById('modalNamesList');
            if (!modal || !listContainer) return;

            listContainer.innerHTML = "";

            // Vypíšeme všetky mená pod seba
            dnesneVsetkyMena.forEach((meno, index) => {
                const item = document.createElement('div');
                let symbol = "";
                
                // Pridáme symboly k menám aj v okne, ak sa nachádzajú v tvojich zoznamoch
                if (RODINA.includes(meno)) symbol = "❤️ ";
                else if (MOJE_MENA.includes(meno)) symbol = "⭐ ";
                else if (SPOLUZIACI.includes(meno)) symbol = "🎓 ";
                else if (KOLEGOVIA.includes(meno)) symbol = "💼 ";

                item.textContent = `${symbol}${meno}`;
                // Prvé meno zvýrazníme, keďže je hlavné
                if (index === 0) {
                    item.style.color = "#ff9f0a";
                    item.style.borderBottom = "1px solid #222";
                    item.style.paddingBottom = "8px";
                    item.style.marginBottom = "4px";
                } else {
                    item.style.color = "#aaa";
                    item.style.fontSize = "18px";
                }
                listContainer.appendChild(item);
            });

            modal.style.display = "flex";
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sep = document.getElementById('dateSeparator');
            if(sep) sep.style.display = "none";

            // Pri načítaní stránky preveríme a stiahneme meniny
            skontrolujAObnovMeniny();
            
            // Kontrola pri každom kliknutí/dotyku kdekoľvek na stránke
            document.addEventListener('click', skontrolujAObnovMeniny);
            
            // Kontrola pri prebudení obrazovky / návrate na kartu
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    skontrolujAObnovMeniny();
                }
            });
            
            // --- CENTRÁLNY AUDIO EVENT MANAŽMENT PRE STOP/PAUSE S ČASOVAČOM ---
            audio.addEventListener('play', () => {
                clearTimeout(globalPauseToStopTimeout); 
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
                renderSidebarFavorites();
                aktualizujNochnyPrehravacVizual();
            });

            audio.addEventListener('pause', () => {
                // OKAMŽITÉ VYMAZANIE TEXTU PRI AKOMKOĽVEK PAUSE
                document.getElementById("player-now-playing").innerText = "";
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
                renderSidebarFavorites();
                aktualizujNochnyPrehravacVizual();

                // SPUSŤ 5-MINÚTOVÝ ČASOVAČ DO TVRDEHO STOPU
                clearTimeout(globalPauseToStopTimeout);
                console.log("Audio pozastavené, spúšťam 5-minútový limit pre automatický STOP...");
                globalPauseToStopTimeout = setTimeout(() => {
                    console.log("Limit vypršal: Vykonávam automatický HARD STOP na uvoľnenie streamu.");
                    audio.src = "";
                    audio.load();
                    currentPlayingType = "";
                    if ('mediaSession' in navigator) navigator.mediaSession.metadata = null;
                    renderSidebarFavorites();
                    runClockEngine();
                    aktualizujNochnyPrehravacVizual();
                    if (metadataController) metadataController.abort();
                    if (bauerIntervalId) {
                        clearInterval(bauerIntervalId);
                        bauerIntervalId = null;
                    }
                    document.getElementById("player-now-playing").innerText = "";
                }, CAS_PRE_HARD_STOP);
            });
                
            fetchWeatherData();
            setInterval(fetchWeatherData, 15 * 60 * 1000);
            runClockEngine();
            setInterval(runClockEngine, 1000);
            fetchNamedayData();
            renderSidebarFavorites();
            inicializujPlochuNastaveni();
            aktualizujTlacidloMesta();
        });

        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) event.preventDefault();
        }, { passive: false });

        let metadataController = null; // Umožní nám zastaviť čítanie pri prepnutí rádia
        let bauerIntervalId = null;    // Globálna premenná na zastavenie aktualizácie pesničiek Bauer rádií

        
        async function sledujStreamMetadat(streamUrl) {
            const textElement = document.getElementById("player-now-playing");
            
            // 1. Okamžitý reset - pri každom prepnutí okamžite vyčistíme obrazovku
            textElement.innerText = ""; 
            
            // Zastavíme predchádzajúce čítanie streamu
            if (metadataController) {
                metadataController.abort();
                metadataController = null;
            }
            
            // Vyčistíme staré Bauer intervaly, ak nejaké bežali
            if (bauerIntervalId) {
                clearInterval(bauerIntervalId);
                bauerIntervalId = null;
            }
            
            // Vytvoríme nový controller pre toto rádio
            metadataController = new AbortController();
            const localSignal = metadataController.signal;
        
            // --- VÝNIMKA PRE RÁDIO ROCK (cez radia.sk) ---
            if (currentPlayingType === 'rock') {
                const nacitajRockPiesen = async () => {
                    if (localSignal.aborted || currentPlayingType !== 'rock') return;
            
                    try {
                        const targetUrl = encodeURIComponent('https://www.radia.sk/radia/rock/playlist');
                        const res = await fetch(`https://api.allorigins.win/get?url=${targetUrl}`, { signal: localSignal });
                        const data = await res.json();
            
                        if (localSignal.aborted || currentPlayingType !== 'rock') return;
            
                        if (data && data.contents) {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(data.contents, 'text/html');
                            
                            // Vytiahneme najnovšiu pesničku z vrchu tabuľky
                            const prvyRiadok = doc.querySelector('#playlist_table .row.data');
            
                            if (prvyRiadok) {
                                const artist = prvyRiadok.querySelector('.interpret')?.textContent.trim() || '';
                                const song = prvyRiadok.querySelector('.titul')?.textContent.trim() || '';
            
                                textElement.innerText = (artist || song) ? `${artist} - ${song}` : "";
                                return;
                            }
                        }
                        textElement.innerText = "";
                    } catch (e) {
                        if (e.name !== 'AbortError') {
                            console.log("Radia.sk Rock Parsing Error:", e);
                            textElement.innerText = "";
                        }
                    }
                };
            
                await nacitajRockPiesen();
                bauerIntervalId = setInterval(nacitajRockPiesen, 30000); // Obnova každých 30s
                return;
            }
            // --- VÝNIMKA PRE SLOVENSKÝ ROZHLAS (STVR) ---
            const sroMap = {
                'slovensko': { domain: 'slovensko.stvr.sk', channel: 12 },
                'fm':        { domain: 'fm.stvr.sk',        channel: 5 },
                'devin':     { domain: 'devin.stvr.sk',     channel: 3 },
                'regina':    { domain: 'reginazapad.stvr.sk', channel: 1 }
            };
            
            if (sroMap[currentPlayingType]) {
                const stanica = sroMap[currentPlayingType];
                const spustenaStanicaType = currentPlayingType; // Uložíme si štartovaciu stanicu
            
                const nacitajSroPlaylist = async () => {
                    // Kontrola, či sa medzičasom nezmenila stanica alebo nezastavil prehrávač
                    if (localSignal.aborted || currentPlayingType !== spustenaStanicaType) return;
            
                    try {
                        const playlistUrl = `https://${stanica.domain}/json/snippet/radio_playlist.json?channel=${stanica.channel}`;
                        const targetUrl = encodeURIComponent(playlistUrl);
                        
                        const res = await fetch(`https://api.allorigins.win/get?url=${targetUrl}`, { signal: localSignal });
                        const data = await res.json();
                        
                        if (localSignal.aborted || currentPlayingType !== spustenaStanicaType) return;
            
                        if (data && data.contents) {
                            const jsonData = JSON.parse(data.contents);
                            const htmlSnippet = jsonData.snippets?.['snippet-playlist'];
            
                            if (htmlSnippet) {
                                const parser = new DOMParser();
                                const doc = parser.parseFromString(htmlSnippet, 'text/html');
                                const firstItem = doc.querySelector('li.list');
            
                                if (firstItem) {
                                    // Použijeme textContent namiesto innerText pre lepšiu kompatibilitu s DOMParser
                                    const artist = firstItem.querySelector('.title')?.textContent.trim() || '';
                                    const song = firstItem.querySelector('.song')?.textContent.trim() || '';
                                    
                                    textElement.innerText = (artist || song) ? `${artist} - ${song}` : "";
                                    return;
                                }
                            }
                        }
                        textElement.innerText = "";
                    } catch (e) {
                        if (e.name !== 'AbortError') {
                            console.log("STVR API Error:", e);
                            textElement.innerText = "";
                        }
                    }
                };
            
                await nacitajSroPlaylist();
                bauerIntervalId = setInterval(nacitajSroPlaylist, 30000);
                return;
            }
            // 3. PRIAME ČÍTANIE METADÁT ZO STREAMU (Slovensko, FM, Fun, Chill...)
            try {
                // Počkáme 1.5 sekundy, kým sa audio prúd reálne naštartuje a až potom pošleme požiadavku na metadáta
                await new Promise(resolve => setTimeout(resolve, 1500));
                if (localSignal.aborted) return;

                const response = await fetch(streamUrl, {
                    headers: { 'Icy-Metadata': '1' },
                    signal: localSignal 
                }).catch(err => {
                    throw new Error("CORS_OR_NETWORK_ERROR");
                });
        
                const metaInt = parseInt(response.headers.get('icy-metaint'));
                if (!metaInt) {
                    textElement.innerText = ""; // Žiadne metadáta v streame = ticho
                    return;
                }
        
                const reader = response.body.getReader();
                let buffer = new Uint8Array();
        
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
        
                    let newBuffer = new Uint8Array(buffer.length + value.length);
                    newBuffer.set(buffer);
                    newBuffer.set(value, buffer.length);
                    buffer = newBuffer;
        
                    while (buffer.length > metaInt) {
                        const metaLengthByte = buffer[metaInt];
                        const metaLength = metaLengthByte * 16; 
        
                        if (buffer.length >= metaInt + 1 + metaLength) {
                            if (metaLength > 0) {
                                const metaBytes = buffer.subarray(metaInt + 1, metaInt + 1 + metaLength);
                                const decoder = new TextDecoder('utf-8');
                                const metaString = decoder.decode(metaBytes);
        
                                const match = metaString.match(/StreamTitle='(.*?)';/);
                                if (match && match[1]) {
                                    // Odstránime prípadné zbytočné medzery a ak je názov reálny, zobrazíme ho
                                    const cistyNazov = match[1].trim();
                                    textElement.innerText = cistyNazov !== "" ? cistyNazov : "";
                                }
                            }
                            buffer = buffer.subarray(metaInt + 1 + metaLength);
                        } else {
                            break;
                        }
                    }
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.log("Metadáta nedostupné (CORS/Network):", error.message);
                    textElement.innerText = ""; // Akékoľvek zlyhanie siete/CORS prebehne bez textu na displeji
                }
            }
        }

        // --- SCRIPT PRE SPRIEVODCU (INTRO TOUR) ---
            const tourKroky = [
                {
                    element: ".buttons-section", // oblasť tlačidiel rádia
                    title: "📻 Obľúbené stanice",
                    desc: "Kliknutím na rádio okamžite spustíte živý stream. Opätovným kliknutím rádio vypnete."
                },
                {
                    element: "#time", // oblasť hodín
                    title: "⏰ Hodiny a Nočný režim",
                    desc: "Kliknutím na hodiny manuálne prepnete dashboard do šetriča/nočného režimu. Opätovným dotykom ho prebudíte."
                },
                {
                    element: ".ss-left-col", // oblasť počasia
                    title: "☀️ Počasie a Predpoveď",
                    desc: "Kliknutím na sekciu počasia otvoríte podrobný hodinový graf. Názov mesta vás presmeruje na živú mapu Windy."
                },
                {
                    element: "#spotify-links-container", // prípadne ozubené koliesko
                    title: "⚙️ Nastavenia & Prispôsobenie",
                    desc: "Tu si môžete zmeniť farbu nočného režimu, nastaviť čas spánku alebo upraviť nastavenia."
                }
            ];
            
            let aktualnyKrokTour = 0;
            let tourTimer = null;
            let tourOdskratka = 6; 
            let tourPocitadlo = tourOdskratka;
            
            function spustiTourAkJePrvykrat() {
                if (!localStorage.getItem('kiosk_tour_done')) {
                    // Zapíšeme okamžite, aby sa po stlačení F5 už znova nezobrazovalo
                    localStorage.setItem('kiosk_tour_done', 'true');
                    
                    setTimeout(() => {
                        const overlay = document.getElementById('tour-overlay');
                        if (overlay) {
                            overlay.style.display = 'flex';
                            aktualnyKrokTour = 0;
                            zobrazKrokTour(0);
                        }
                    }, 1000);
                }
            }
            
            function zobrazKrokTour(index) {
                clearInterval(tourTimer);
                document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
            
                if (index >= tourKroky.length) {
                    ukonciTour();
                    return;
                }
            
                const krok = tourKroky[index];
                const el = document.querySelector(krok.element);
            
                if (el) {
                    el.classList.add('tour-highlight');
                }
            
                document.getElementById('tour-step-badge').textContent = `Krok ${index + 1} / ${tourKroky.length}`;
                document.getElementById('tour-title').textContent = krok.title;
                document.getElementById('tour-desc').textContent = krok.desc;
            
                tourPocitadlo = tourOdskratka;
                aktualizujTextTlacidla(index);
            
                tourTimer = setInterval(() => {
                    tourPocitadlo--;
                    if (tourPocitadlo > 0) {
                        aktualizujTextTlacidla(index);
                    } else {
                        clearInterval(tourTimer);
                        dalsiKrokTour();
                    }
                }, 1000);
            }
            
            function aktualizujTextTlacidla(index) {
                const btnNext = document.getElementById('tour-next-btn');
                if (!btnNext) return;
                
                if (index === tourKroky.length - 1) {
                    btnNext.textContent = `Rozumiem (${tourPocitadlo}s)`;
                } else {
                    btnNext.textContent = `Ďalej (${tourPocitadlo}s)`;
                }
            }
            
            function dalsiKrokTour() {
                clearInterval(tourTimer);
                aktualnyKrokTour++;
                if (aktualnyKrokTour < tourKroky.length) {
                    zobrazKrokTour(aktualnyKrokTour);
                } else {
                    ukonciTour();
                }
            }
            
            function ukonciTour() {
                clearInterval(tourTimer);
                document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
                const overlay = document.getElementById('tour-overlay');
                if (overlay) overlay.style.display = 'none';
                localStorage.setItem('kiosk_tour_done', 'true');
            }
            
            function spustiTourZnova() {
                localStorage.removeItem('kiosk_tour_done');
                location.reload();
            }
            
            // Spustenie pri načítaní stránky
            document.addEventListener('DOMContentLoaded', () => {
                spustiTourAkJePrvykrat();
            });

        // Pomocná funkcia na pridanie animácie k ľubovoľnému elementu ikony
            function priradAnimaciuIkone(element, wCode) {
                if (!element) return;
                
                // Zrušíme prípadnú starú animáciu
                element.style.animation = 'none';
                
                // Priradíme novú podľa kódu počasia
                if (wCode === 0) {
                    element.style.animation = 'sunRotatePulse 20s infinite linear';
                } else if (wCode >= 1 && wCode <= 3) {
                    element.style.animation = 'cloudFloat 4s infinite ease-in-out';
                } else if ((wCode >= 51 && wCode <= 67) || (wCode >= 80 && wCode <= 82) || (wCode >= 71 && wCode <= 77)) {
                    element.style.animation = 'rainDrop 2s infinite ease-in-out';
                } else if (wCode >= 95) {
                    element.style.animation = 'lightningFlash 4s infinite ease-in-out';
                } else {
                    element.style.animation = 'cloudFloat 5s infinite ease-in-out';
                }
            }
        
    </script>
     <!-- Vyskakujúce okno pre zoznam mien -->
    <div id="namesModal" style="display: none; position: fixed; z-index: 9999999; left: 0; top: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); justify-content: center; align-items: center;" onclick="this.style.display='none'">
        <div style="background: #111; border: 1px solid #ff9f0a; padding: 20px; border-radius: 12px; text-align: center; min-width: 250px; max-width: 80%;" onclick="event.stopPropagation()">
            <h3 style="color: #ff9f0a; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 16px;">Dnes majú meniny</h3>
            <div id="modalNamesList" style="font-size: 20px; font-weight: bold; color: #fff; display: flex; flex-direction: column; gap: 8px; margin: 15px 0;"></div>
            <button onclick="document.getElementById('namesModal').style.display='none'" style="background: #222; color: #ff9f0a; border: 1px solid #ff9f0a; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;">Zatvoriť</button>
        </div>
    </div>
    
<!-- INTRO TOUR PRE NOVÝCH POUŽÍVATEĽOV -->
<div id="tour-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 99999990; pointer-events: none;">
    <div id="tour-box" style="position: absolute; top: 20px; right: 20px; background: #111; border: 2px solid #ff9f0a; border-radius: 16px; padding: 20px; max-width: 320px; width: 85%; text-align: center; box-shadow: 0 0 25px rgba(0,0,0,0.9); z-index: 99999999; pointer-events: auto;">
        <div id="tour-step-badge" style="font-size: 11px; font-weight: bold; color: #ff9f0a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Krok 1 / 4</div>
        <h3 id="tour-title" style="margin: 0 0 10px 0; color: #fff; font-size: 18px;">Vitajte v Kiosku! 📻</h3>
        <p id="tour-desc" style="color: #ccc; font-size: 14px; line-height: 1.4; margin-bottom: 20px;">Tento prehľadný sprievodca vám v 4 rýchlych krokoch ukáže, ako dashboard používať.</p>
        
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
            <button onclick="ukonciTour()" style="background: transparent; color: #aaa; border: none; font-size: 13px; cursor: pointer; padding: 5px;">Preskočiť</button>
            <button id="tour-next-btn" onclick="dalsiKrokTour()" style="background: #ff9f0a; color: #000; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer;">Ďalej</button>
        </div>
    </div>
</div>
