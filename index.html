<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="📻">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>Tvoje radio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>">
    
    <link class="apple-touch-icon" href="https://raw.githubusercontent.com/zmobilu/assets/main/kiosk-ikona.png">
    <meta property="og:image" content="https://raw.githubusercontent.com/zmobilu/assets/main/kiosk-ikona.png">
    
    <style>
        /* --- CENTRÁLNE RIADENÁ FARBA NOCNÉHO REŽIMU --- */
        :root {
            --night-color: #ffff00;
        }

        /* --- RESET A ZÁKLADNÉ NASTAVENIE --- */
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; height: 100vh; width: 100vw;
            overflow: hidden; box-sizing: border-box; -webkit-user-select: none; user-select: none;
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
        }

        /* --- HORNE MINIMALISTICKÉ MENU --- */
        .top-navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0 15px; 
            background: #050505; 
            border-bottom: 1px solid #111;
            height: 48px; 
            box-sizing: border-box; 
            flex-shrink: 0;
            padding-left: calc(15px + env(safe-area-inset-left));
            padding-right: calc(15px + env(safe-area-inset-right));
            position: relative; /* Pridané pre absolútne centrovanie vnútra */
        }
        .nav-left-info { 
            display: flex; 
            align-items: center; 
            gap: 18px;            /* Mierne zväčšená medzera medzi prvkami */
            font-size: 16px;      /* Zväčšené základné písmo (z 14px) */
            color: #aaa; 
            font-weight: 400; 
            
            /* Magické centrovanie presne na stred lišty */
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;  /* Zabráni nežiaducemu zalomeniu textu */
        }
        
        /* O chlp zväčšíme aj jednotlivé podprvky pre lepší kontrast */
        .nav-clock { font-size: 19px; font-weight: 700; color: #fff; }
        .nav-nameday { color: #ff9f0a; font-weight: 500; font-size: 16px; }
        
        /* Zväčšené a posunuté tlačidlo nastavení pre bezchybný dotyk na iOS */
        .btn-settings { 
            background: #111; border: 1px solid #222; color: #666; font-size: 20px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 50%; margin-top: 4px;
            transition: color 0.2s, background 0.2s, border-color 0.2s; 
        }
        .btn-settings.active { color: #ff9f0a; border-color: #ff9f0a; background: #1a1a1a; }

        /* --- HLAVNÁ ROZDELENÁ PLOCHA --- */
        .workspace-container { display: flex; flex: 1; width: 100vw; overflow: hidden; }

        /* Ľavá sekcia: 6 obľúbených položiek (35%) */
        .favorites-sidebar {
            width: 35%; background: #050505; border-right: 1px solid #111;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr);
            gap: 6px; padding: 6px; box-sizing: border-box;
            padding-left: calc(6px + env(safe-area-inset-left));
        }
        .fav-card {
            background: #111; border: 1px solid #222; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; padding: 6px; box-sizing: border-box; position: relative; overflow: hidden;
            transition: transform 0.1s, border-color 0.15s;
        }
        .fav-card:not(.empty):active { transform: scale(0.97); }
        .fav-card.playing { border: 2px solid #ff9f0a !important; background: #151515; }
        .fav-card img { width: 75%; height: 75%; object-fit: contain; }
        .fav-card i { font-size: 30px; }
        .fav-card span { font-size: 11px; font-weight: 600; text-transform: uppercase; text-align: center; margin-top: 2px; }
        
        .fav-card.empty { border: 1px dashed #222; background: transparent; cursor: default; }
        .fav-card.empty i { color: #333; font-size: 22px; }

        /* Pravá sekcia: Hlavný obsah alebo nastavenia (65%) */
        .main-content-area { width: 65%; background: #000; position: relative; overflow: hidden; }
        
        /* --- PROFI DIZAJN VEĽKÝCH HODÍN --- */
        .placeholder-view {
            display: flex; width: 100%; height: 100%; flex-direction: column;
            align-items: center; justify-content: center; background: #000; box-sizing: border-box;
            padding-right: env(safe-area-inset-right);
        }
        .big-clock-time {
            font-size: 16vw; font-weight: 700; line-height: 0.9; letter-spacing: -4px;
            display: flex; align-items: baseline; transform: scaleY(1.05); cursor: pointer;
        }
        .big-clock-hours { color: #fff; font-weight: 700; }
        .big-clock-minutes { color: #fff; font-weight: 200; margin-left: 2px; }
        .big-clock-date-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 15px;
        }
        .big-clock-date {
            font-size: 2.8vw; font-weight: 300; color: #ccc; text-transform: uppercase; letter-spacing: 1px;
        }
        .big-clock-nameday {
            font-size: 2.2vw; font-weight: 400; color: #ff9f0a; letter-spacing: 0.5px; margin-top: 2px;
        }

        /* --- ZÚŽENÝ EXTRA KOMPAKTNÝ PANEL BEZ TEXTOV --- */
        .settings-night-panel {
            background: #0d0d0d; padding: 8px; border-bottom: 2px solid #1a1a1a;
            display: flex; flex-direction: row; gap: 6px; box-sizing: border-box; justify-content: space-between;
        }
        .settings-night-row { 
            display: flex; align-items: center; background: #151515; padding: 6px 10px; 
            border-radius: 8px; border: 1px solid #222; gap: 8px; flex: 1; justify-content: center;
        }
        .settings-night-row i.label-icon { font-size: 14px; color: #666; width: 16px; text-align: center; }
        .settings-night-row button { background: #222; color: #fff; border: 1px solid #444; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .color-picker-group { display: flex; gap: 5px; }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; box-sizing: border-box; }
        .color-dot.active-color { border-color: #fff !important; transform: scale(1.1); }

        /* Mriežka všetkých rádií v režime nastavení */
        .settings-grid-view {
            display: none; width: 100%; height: 100%; overflow-y: auto;
            padding: 10px; box-sizing: border-box; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px; align-content: start; background: #090909;
            padding-right: calc(10px + env(safe-area-inset-right));
        }
        .cfg-mini-card {
            background: #151515; border: 1px solid #252525; border-radius: 10px;
            aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 6px; cursor: pointer; box-sizing: border-box; position: relative;
        }
        .cfg-mini-card img { width: 60%; height: 60%; object-fit: contain; }
        .cfg-mini-card i { font-size: 22px; }
        .cfg-mini-card span { font-size: 9px; text-transform: uppercase; font-weight: 600; text-align: center; color: #888; margin-top: 3px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .cfg-mini-card.selected { border: 3px solid #ff9f0a !important; background: #1a1a1a; }
        .cfg-mini-card.selected span { color: #ff9f0a; }

        .settings-label-separator {
            grid-column: 1 / -1; font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.5px; color: #555; margin: 12px 0 2px 4px;
            font-weight: 700; border-bottom: 1px solid #1a1a1a; padding-bottom: 3px;
        }

        /* --- SPODNÁ FIXNÁ OVLÁDACIA LIŠTA --- */
        .bottom-player-bar {
            background: #050505; border-top: 1px solid #111; height: 65px;
            padding: 0 15px; display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; flex-shrink: 0;
            padding-left: calc(15px + env(safe-area-inset-left));
            padding-right: calc(15px + env(safe-area-inset-right));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .player-info-block { display: flex; flex-direction: column; justify-content: center; width: 35%; overflow: hidden; }
        .player-info-block h4 { margin: 0; font-size: 13px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        .player-info-block p { margin: 1px 0 0 0; font-size: 11px; color: #ff9f0a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .player-action-block { display: flex; align-items: center; justify-content: center; }
        .btn-power-toggle {
            background: #151515; border: 1px solid #222; color: #eb0028; font-size: 22px;
            width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: background 0.15s;
        }
        .btn-power-toggle:active { background: #252525; }
        .btn-power-toggle.playing { color: #21D844; border-color: #21D844; }

        .player-utility-block { display: flex; align-items: center; gap: 8px; width: 35%; justify-content: flex-end; }
        .slider-vol { accent-color: #ff9f0a; width: 85px; cursor: pointer; height: 5px; background: #333; border-radius: 3px; border: none; }

        #nightBottomInfo { display: none; }

        /* --- STYLING PRE FILTROVANIE CELOOBRAZOVKOVÉHO NOČNÉHO REŽIMU --- */
        body.full-night-mode .top-navbar,
        body.full-night-mode .favorites-sidebar,
        body.full-night-mode .bottom-player-bar,
        body.full-night-mode .big-clock-date-wrapper {
            display: none !important;
        }
        body.full-night-mode .workspace-container { width: 100vw; height: 100vh; }
        body.full-night-mode .main-content-area { width: 100vw; height: 100vh; }
        body.full-night-mode .placeholder-view {
            width: 100vw !important; height: 100vh !important;
            justify-content: center !important; align-items: center !important; padding: 0 !important;
        }
        body.full-night-mode .big-clock-time {
            font-size: 28vw !important; letter-spacing: -2px !important; margin: 0 !important;
        }
        body.full-night-mode .big-clock-hours,
        body.full-night-mode .big-clock-minutes,
        body.full-night-mode #nightBottomInfo {
            color: var(--night-color) !important;
        }
        body.full-night-mode #nightBottomInfo {
            display: block !important; position: absolute !important; bottom: 8vh !important;
            font-size: 2.8vw !important; font-weight: 300; letter-spacing: 1px; opacity: 0.85; text-align: center;
        }

        @media (min-width: 768px) {
            .top-navbar { height: 52px; }
            .bottom-player-bar { height: 75px; }
            .favorites-sidebar { gap: 10px; padding: 10px; }
            .fav-card span { font-size: 12px; }
            .slider-vol { width: 120px; }
            .settings-night-panel { padding: 10px; gap: 10px; }
            .color-dot { width: 22px; height: 22px; }
        }
        /* --- AUTOMATICKÉ PREKRESLENIE PRE REŽIM NA VÝŠKU --- */
        @media (orientation: portrait) {
            /* Hlavný kontajner otočíme z horizontálneho na vertikálny smer */
            .workspace-container {
                flex-direction: column;
            }

            /* Ľavá sekcia (teraz spodná): Rádia berú celú šírku a cca 30% výšky obrazovky */
            .favorites-sidebar {
                width: 100vw;
                height: auto;
                flex-shrink: 0;
                order: 2; /* Presunie blok rádií pod hodiny */
                grid-template-columns: repeat(3, 1fr); /* 3 stĺpce */
                grid-template-rows: repeat(2, 1fr);    /* 2 riadky */
                border-right: none;
                border-top: 1px solid #111;
                gap: 8px;
                padding: 8px;
                padding-bottom: calc(8px + env(safe-area-inset-bottom));
                padding-left: calc(8px + env(safe-area-inset-left));
                padding-right: calc(8px + env(safe-area-inset-right));
            }

            /* Pravá sekcia (teraz horná): Hodiny a nastavenia obsadia zvyšok (cca 70% výšky) */
            .main-content-area {
                width: 100vw;
                flex: 1;
                order: 1; /* Ponechá hodiny navrchu */
            }

            /* Prispôsobenie veľkých hodín pre vertikálny režim */
            .big-clock-time {
                font-size: 26vw; /* Zväčšíme čísla na výšku, keďže máme viac miesta */
            }
            
            .big-clock-date {
                font-size: 4.5vw;
            }
            
            .big-clock-nameday {
                font-size: 4vw;
            }

            /* V režime na výšku skryjeme spodnú lištu prehrávača, 
               keďže ovládanie hlasitosti a power button môžeme neskôr elegantne zapracovať priamo k hodinám,
               alebo ak ju chceš nechať, stačí odstrániť riadok nižšie */
            .bottom-player-bar {
                /* display: none; */ /* Odtajni, ak chceš získať maximum miesta pre hodiny */
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
</head>
<body id="mainBody">

    <audio id="audioPlayer" preload="none" playsinline></audio>

    <header class="top-navbar">
        <div class="nav-left-info">
            <!-- PREHODENÉ PORADIE: Najprv dátum, potom hodiny, nakoniec meno -->
            <span id="dateBox">--.--.----</span>
            <span class="nav-clock" id="clockBox">00:00</span>
            <span class="nav-nameday" id="nameBox">---</span>
        </div>
        <button class="btn-settings" id="settingsToggleBtn" onclick="toggleSettingsMode(); event.stopPropagation();" title="Správa obľúbených">
            <i class="fa-solid fa-gear"></i>
        </button>
    </header>

    <div class="workspace-container">
        
        <aside class="favorites-sidebar" id="favSidebarContainer">
        </aside>

        <main class="main-content-area">
            
            <div class="placeholder-view" id="rightPlaceholder">
                <div class="big-clock-time" onclick="handleBigClockClick()">
                    <span class="big-clock-hours" id="bigHours">00</span>
                    <span class="big-clock-minutes" id="bigMinutes">00</span>
                </div>
                <div class="big-clock-date-wrapper">
                    <span class="big-clock-date" id="bigDate">Pondelok, 1.1.</span>
                    <span class="big-clock-nameday" id="bigNameday">Dnes má meniny: ---</span>
                </div>
                <div id="nightBottomInfo"></div>
            </div>

            <!-- Pridané zachytávanie kliknutí pre reštart 10s auto-close časovača -->
            <div class="settings-grid-view" id="settingsGridView" onclick="resetSettingsTimer()">
                
                <div class="settings-night-panel" style="grid-column: 1 / -1;" onclick="resetSettingsTimer()">
                    <div class="settings-night-row">
                        <i class="fa-solid fa-clock label-icon" title="Trvanie noci"></i>
                        <div>
                            <button onclick="zmenNastavenieCasu('od'); event.stopPropagation();" id="set-night-from">20:00</button>
                            <span style="color: #444; margin: 0 2px;">-</span>
                            <button onclick="zmenNastavenieCasu('do'); event.stopPropagation();" id="set-night-to">05:20</button>
                        </div>
                    </div>
                    
                    <div class="settings-night-row">
                        <i class="fa-solid fa-bed label-icon" title="Prerušenie noci (Snooze)"></i>
                        <button onclick="zmenDobuOdkladu(); event.stopPropagation();" id="set-snooze-time">1 min</button>
                    </div>
                    
                    <div class="settings-night-row">
                        <i class="fa-solid fa-palette label-icon" title="Farba nočného zobrazenia"></i>
                        <div class="color-picker-group">
                            <div onclick="nastavFarbuNoci('#ffff00', this); event.stopPropagation();" class="color-dot" style="background: #ffff00;"></div>
                            <div onclick="nastavFarbuNoci('#eb0028', this); event.stopPropagation();" class="color-dot" style="background: #eb0028;"></div>
                            <div onclick="nastavFarbuNoci('#ffa500', this); event.stopPropagation();" class="color-dot" style="background: #ffa500;"></div>
                            <div onclick="nastavFarbuNoci('#32CD32', this); event.stopPropagation();" class="color-dot" style="background: #32CD32;"></div>
                            <div onclick="nastavFarbuNoci('#ffffff', this); event.stopPropagation();" class="color-dot" style="background: #ffffff;"></div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <footer class="bottom-player-bar">
        <div class="player-info-block">
            <h4 id="lblStation">RÁDIO VYPNUTÉ</h4>
            <p id="lblTrack">Zvoľte stanicu vľavo</p>
        </div>

        <div class="player-action-block">
            <button onclick="handlePowerButton()" class="btn-power-toggle" id="powerBtn" title="Zapnúť / Vypnúť">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>

        <div class="player-utility-block">
            <i class="fa-solid fa-volume-low" style="color: #444; font-size: 12px;"></i>
            <input type="range" id="volControl" class="slider-vol" min="0" max="100" value="80" oninput="adjustVolume(this.value)">
        </div>
    </footer>

    <script>
        const audio = document.getElementById('audioPlayer');
        let currentPlayingType = "";
        let isSettingsModeActive = false;
        let dnesneMeno = "";
        let settingsTimeout = null; // Časovač pre automatické zatvorenie
        // --- POMOCNÉ PREMENNÉ PRE AUDIO WATCHDOG ---
        let watchdogPoslednyCas = -1;
        let watchdogPocitadloZaseknutia = 0;
        // --- REGISTRE / PREMENNÉ PRE NOČNÝ REŽIM ---
        let cfgNocOd = localStorage.getItem('cfg_night_from') || "20:00";
        let cfgNocDo = localStorage.getItem('cfg_night_to') || "05:20";
        let cfgSnoozeMin = parseInt(localStorage.getItem('cfg_snooze_min') || "1");
        let cfgFarbaNoci = localStorage.getItem('cfg_night_color') || "#ffff00";
        let nocnyRezimSnoozeDo = 0;
        const noSleep = new NoSleep();

        // Keď používateľ klikne na rádio a spustí hudbu, aktivuje sa aj neviditeľné video
        document.addEventListener('click', function enableNoSleep() {
            noSleep.enable();
            console.log("NoSleep aktivovaný - obrazovka nezhasne.");
            // Odstránime poslucháč, aby sme to neaktivovali pri každom kliku
            document.removeEventListener('click', enableNoSleep);
        }, false);

        // --- VNÚTORNÁ DATABÁZA KIOSKU ---

            { id: "fm", name: "Rádio_FM", url: "https://icecast.stv.livebox.sk/fm_128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoRadioFM.png", style: "background:#111;", category: "Verejnoprávne" },
            { id: "regina", name: "Regina", url: "https://icecast.stv.livebox.sk/regina-ba_128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoRadioReginaZ.png", style: "background:#111;", category: "Verejnoprávne" },
            { id: "devin", name: "Devín", url: "https://icecast.stv.livebox.sk/devin_128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoRadioDevin.png", style: "background:#111;", category: "Verejnoprávne" },
            { id: "junior", name: "Junior", url: "https://icecast.stv.livebox.sk/junior_128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoRadioJunior.png", style: "background:#111;", category: "Verejnoprávne" },
            { id: "litera", name: "Litera", url: "https://icecast.stv.livebox.sk/litera_128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoRadioLitera.png", style: "background:#111;", category: "Verejnoprávne" },
            
            { id: "fun", name: "Fun Radio", url: "https://stream.funradio.sk/fun192.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoFunRadio.png", style: "background:#fff;", category: "Fun Kontajner" },
            { id: "funchill", name: "Fun Chill", url: "https://stream.funradio.sk/chill128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoFunChill.png", style: "background:#111;", category: "Fun Kontajner" },
            { id: "fun8090", name: "Fun 80-90", url: "https://stream.funradio.sk/80-90-128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoFun8090.png", style: "background:#111;", category: "Fun Kontajner" },
            { id: "funczsk", name: "Fun CZ-SK", url: "https://stream.funradio.sk/cs128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoFunCZSK.png", style: "background:#111;", category: "Fun Kontajner" },
            { id: "milenialky", name: "Milenialky", url: "https://stream.funradio.sk/milenialky128.mp3", img: "https://raw.githubusercontent.com/zmobilu/assets/main/LogoFun2000.png", style: "background:#111;", category: "Fun Kontajner" },

        ];
        const RODINA = ['Dominik', 'Janka', 'Patrik', 'Martin', 'Andrea', 'Roman', 'Emília', 'Ján', 'Mária', 'Juraj', 'Tatiana', 'Rastislav', 'Viktor', 'Adela', 'Linda', 'Michal', 'Ondrej', 'Jana', 'Viliam', 'Nataša', 'Kristína', 'Tibor', 'Ema'];
        const KOLEGOVIA = ['Ivana', 'Mária', 'Iveta', 'Nina', 'Adriana', 'Jaroslava', 'Eva', 'Jana', 'Judita', 'Martin', 'Jozef', 'Marcel', 'Karol', 'Anna', 'Petra', 'Dominika'];
        const SPOLUZIACI = ['Claudia', 'Bibiana','Zuzana', 'Kristína','Hana', 'Amanda','Viktória', 'Karin','Alexandra', 'Vanesa','Tamara', 'Zoe','Ela', 'Ema','Sebastian', 'Barbora','Jakub', 
                    'Paulína', 'Timothy', 'Maximilián','Adam', 'Milica','Alica', 'Linda', 'Róbert', 'Daniel','Laura', 'Lili', 'Oskar', 'Tomáš','Samuel','Maxim','Alex','Erik','Oliver'];
        const MOJE_MENA = ['Peter', 'Lenka', 'Daniel', 'Hana', 'Lucia', 'Katarína', 'Andrej', 'Zuzana', 'Radoslav', 'Martina', 'Róbert', 'Milan', 'Juraj', 'Ladislav', 'Pavol']; 

        const VOLUME_MAP = { 
            'slovensko': 0.3, 'fm': 0.5, 'devin': 0.5, 'litera': 0.5, 'junior': 0.5, 'regina': 0.5, 'rock': 0.5,
            'fun': 1.0, 'funchill': 0.5, 'funczsk': 0.5, 'fun8090': 0.5, 'milenialky': 0.5,
            'expres': 1.0, 'europa2': 1.0, 'melody': 1.0, 'vlna': 1.0, 'blanik': 0.5, 'topolcany': 0.5,
            'h-techno': 1.0
        };

        let slotFavorites = JSON.parse(localStorage.getItem('kiosk_slots_v2')) || ["slovensko", "funchill", "rock", "blanik", "fun", "spotify"];

        // --- MANAŽMENT PANELU NASTAVENÍ NOČNÉHO REŽIMU ---
        function inicializujPlochuNastaveni() {
            const elFrom = document.getElementById('set-night-from');
            const elTo = document.getElementById('set-night-to');
            const elSnooze = document.getElementById('set-snooze-time');
            
            if (elFrom) elFrom.textContent = cfgNocOd;
            if (elTo) elTo.textContent = cfgNocDo;
            if (elSnooze) elSnooze.textContent = cfgSnoozeMin + " min";
            
            document.documentElement.style.setProperty('--night-color', cfgFarbaNoci);
            
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.remove('active-color');
                if (dot.style.backgroundColor === cfgFarbaNoci || (cfgFarbaNoci === '#ffff00' && dot.style.backgroundColor === 'yellow')) {
                    dot.classList.add('active-color');
                }
            });
        }

        function zmenNastavenieCasu(typ) {
            let povodny = (typ === 'od') ? cfgNocOd : cfgNocDo;
            let novy = prompt(`Zadaj čas pre ${typ === 'od' ? 'ZAČIATOK' : 'KONIEC'} noci (HH:MM):`, povodny);
            if (novy && /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(novy)) {
                if (novy.length === 4 && novy.indexOf(':') === 1) novy = "0" + novy;
                if (typ === 'od') { cfgNocOd = novy; localStorage.setItem('cfg_night_from', novy); } 
                else { cfgNocDo = novy; localStorage.setItem('cfg_night_to', novy); }
                inicializujPlochuNastaveni();
                runClockEngine();
            }
            resetSettingsTimer();
        }

        function zmenDobuOdkladu() {
            let novaDoba = prompt("Zadaj dobu prebudenia hodín v minútach (Snooze):", cfgSnoozeMin);
            if (novaDoba && !isNaN(novaDoba) && parseInt(novaDoba) > 0) {
                cfgSnoozeMin = parseInt(novaDoba);
                localStorage.setItem('cfg_snooze_min', cfgSnoozeMin);
                inicializujPlochuNastaveni();
            }
            resetSettingsTimer();
        }

        function nastavFarbuNoci(hexFarba, element) {
            cfgFarbaNoci = hexFarba;
            localStorage.setItem('cfg_night_color', hexFarba);
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active-color'));
            if(element) element.classList.add('active-color');
            document.documentElement.style.setProperty('--night-color', hexFarba);
            runClockEngine();
            resetSettingsTimer();
        }

        // --- AUTOMATICKÉ ZATVÁRANIE NASTAVENÍ (10 SEKÚND) ---
        function resetSettingsTimer() {
            if (!isSettingsModeActive) return;
            clearTimeout(settingsTimeout);
            settingsTimeout = setTimeout(() => {
                if (isSettingsModeActive) {
                    toggleSettingsMode();
                }
            }, 10000); // 10 sekúnd bez akcie zatvorí režim nastavení
        }

        // --- RENDER ĽAVÉHO PANELU ---
        function renderSidebarFavorites() {
            const container = document.getElementById('favSidebarContainer');
            if(!container) return;
            container.innerHTML = "";

            for (let i = 0; i < 6; i++) {
                const id = slotFavorites[i];
                const item = DATABASE.find(d => d.id === id);
                const card = document.createElement('div');
                
                if (item && id !== null) {
                    card.className = "fav-card";
                    if (currentPlayingType === item.id) card.classList.add("playing");
                    card.setAttribute("style", item.style);
                    card.onclick = () => handleFavCardClick(item);

                    if (item.img) {
                        card.innerHTML = `<img src="${item.img}" alt="${item.name}">`;
                    } else if (item.icon) {
                        card.innerHTML = `<i class="${item.icon}" style="color:${item.color}"></i><span>${item.name}</span>`;
                    }
                } else {
                    card.className = "fav-card empty";
                    card.innerHTML = `<i class="fa-solid fa-plus"></i>`;
                }
                container.appendChild(card);
            }
        }

        // --- RENDER CONFIG mriežky ---
        function renderSettingsGrid() {
            const grid = document.getElementById('settingsGridView');
            if(!grid) return;
            
            const nightPanelHTML = document.querySelector('.settings-night-panel').outerHTML;
            grid.innerHTML = nightPanelHTML;
            
            let currentCategory = "";

            DATABASE.forEach(item => {
                if (item.category !== currentCategory) {
                    currentCategory = item.category;
                    const separator = document.createElement('div');
                    separator.className = "settings-label-separator";
                    separator.textContent = currentCategory;
                    grid.appendChild(separator);
                }

                const card = document.createElement('div');
                card.className = "cfg-mini-card";
                
                const isSelected = slotFavorites.includes(item.id);
                if (isSelected) card.classList.add("selected");

                card.onclick = (e) => { handleChannelSelectionToggle(item.id); e.stopPropagation(); };

                if (item.img) {
                    card.innerHTML = `<img src="${item.img}"><span>${item.name}</span>`;
                } else if (item.icon) {
                    card.innerHTML = `<i class="${item.icon}" style="color:${item.color}"></i><span>${item.name}</span>`;
                }
                grid.appendChild(card);
            });
            
            inicializujPlochuNastaveni();
        }

        function handleChannelSelectionToggle(id) {
            const existingIndex = slotFavorites.indexOf(id);

            if (existingIndex !== -1) {
                slotFavorites[existingIndex] = null;
            } else {
                const freeSlotIndex = slotFavorites.indexOf(null);
                if (freeSlotIndex !== -1) {
                    slotFavorites[freeSlotIndex] = id;
                } else {
                    alert("Všetkých 6 pozícií je plných. Najprv kliknutím uvoľnite niektoré miesto.");
                    return;
                }
            }
            
            localStorage.setItem('kiosk_slots_v2', JSON.stringify(slotFavorites));
            renderSidebarFavorites();
            renderSettingsGrid();
            resetSettingsTimer();
        }

        function toggleSettingsMode() {
            isSettingsModeActive = !isSettingsModeActive;
            const btn = document.getElementById('settingsToggleBtn');
            const placeholder = document.getElementById('rightPlaceholder');
            const gridView = document.getElementById('settingsGridView');

            if (isSettingsModeActive) {
                btn.classList.add('active');
                placeholder.style.display = 'none';
                gridView.style.display = 'grid';
                renderSettingsGrid();
                resetSettingsTimer(); // Spustenie odpočtu pri otvorení
            } else {
                clearTimeout(settingsTimeout);
                btn.classList.remove('active');
                placeholder.style.display = 'flex';
                gridView.style.display = 'none';
            }
        }

        function handleFavCardClick(item) {
            if (isSettingsModeActive) return;
            if (item.url) {
                if (item.icon && (item.id === 'spotify' || item.id === 'applemusic' || item.id === 'youtube' || item.id === 'tidal')) {
                    triggerExternalApp(item.url, item.id);
                } else {
                    playRadio(item.url, item.id);
                }
            }
        }

        // --- AUDIO ENGINE ---
        function playRadio(url, id) {
            // BEZPEČNÉ VYČISTENIE STARÉHO STREAMU PRED ZMENOU
            audio.pause();
            audio.src = "";
            audio.load(); // Vynúti uvoľnenie sieťového bufferu v iOS

            currentPlayingType = id;
            localStorage.setItem('kiosk_last_radio_url', url);
            localStorage.setItem('kiosk_last_radio_type', id);

            document.getElementById('lblStation').textContent = id.toUpperCase();
            document.getElementById('lblTrack').textContent = "Načítavam audio prúd...";
            
            const pBtn = document.getElementById('powerBtn');
            pBtn.classList.add('playing');

            const sliderVal = document.getElementById('volControl').value / 100;
            audio.volume = sliderVal * (VOLUME_MAP[id] || 1.0);

            audio.src = url;
            audio.play()
                .then(() => {
                    document.getElementById('lblTrack').textContent = "Práve hrá";
                    renderSidebarFavorites();
                })
                .catch(() => {
                    document.getElementById('lblTrack').textContent = "Stream je offline";
                });
        }

        function handlePowerButton() {
            if (currentPlayingType !== "") {
                audio.pause(); audio.src = ""; currentPlayingType = "";
                document.getElementById('lblStation').textContent = "RÁDIO VYPNUTÉ";
                document.getElementById('lblTrack').textContent = "Zvoľte stanicu vľavo";
                document.getElementById('powerBtn').classList.remove('playing');
                renderSidebarFavorites();
            } else {
                const sUrl = localStorage.getItem('kiosk_last_radio_url');
                const sType = localStorage.getItem('kiosk_last_radio_type');
                if (sUrl && sType) playRadio(sUrl, sType);
            }
        }

        function adjustVolume(val) {
            audio.volume = (val / 100) * (VOLUME_MAP[currentPlayingType] || 1.0);
        }

        function triggerExternalApp(url, id) {
            audio.pause(); audio.src = ""; currentPlayingType = id;
            document.getElementById('lblStation').textContent = id.toUpperCase();
            document.getElementById('lblTrack').textContent = "Presmerovanie do aplikácie...";
            document.getElementById('powerBtn').classList.remove('playing');
            renderSidebarFavorites();
            setTimeout(() => { window.location.href = url; }, 300);
        }

        // --- SNOOZE FUNKCIA (KLIK NA VEĽKÉ HODINY) ---
        function handleBigClockClick() {
            if (document.body.classList.contains('full-night-mode')) {
                nocnyRezimSnoozeDo = Date.now() + (cfgSnoozeMin * 60 * 1000);
                document.body.classList.remove('full-night-mode');
            }
        }

        // --- ENGINE HODÍN, KALENDÁRA A KONTROLY NOČNÉHO REŽIMU ---
        function runClockEngine() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            
            const timeString = `${h}:${m}`;
            document.getElementById('clockBox').textContent = timeString;
            document.getElementById('bigHours').textContent = h;
            document.getElementById('bigMinutes').textContent = m;
            
            // NÁHRADA PRE FORMÁTOVANIE DÁTUMU V runClockEngine()
            const dniDlhe = ['Nedeľa', 'Pondelok', 'Utorok', 'Streda', 'Štvrtok', 'Piatok', 'Sobota'];
            const dniSkratky = ['Ned', 'Pon', 'Uto', 'Str', 'Štv', 'Pia', 'Sob']; // Čisté 3-písmenové skratky
            // Krátky formát do hornej lišty: bez roku, napr. "Sob 27.6."
            const formatMaly = `${dniSkratky[now.getDay()]} ${now.getDate()}.${now.getMonth() + 1}.`;
            // Veľký formát na plochu: plný názov s rokom, napr. "Sobota, 27.6.2026"
            const formatVelky = `${dniDlhe[now.getDay()]}, ${now.getDate()}.${now.getMonth() + 1}.${now.getFullYear()}`;
            
            document.getElementById('dateBox').textContent = formatMaly;
            document.getElementById('bigDate').textContent = formatVelky;

            const aktualnyCasVMinutach = now.getHours() * 60 + now.getMinutes();
            const terazMili = Date.now();

            const [odH, odM] = cfgNocOd.split(':').map(Number);
            const [doH, doM] = cfgNocDo.split(':').map(Number);
            const casOd = odH * 60 + odM;
            const casDo = doH * 60 + doM;

            let jeNocnyCas = (casOd > casDo) 
                ? (aktualnyCasVMinutach >= casOd || aktualnyCasVMinutach < casDo)
                : (aktualnyCasVMinutach >= casOd && aktualnyCasVMinutach < casDo);

            const bodyEl = document.getElementById('mainBody');
            const bottomInfoEl = document.getElementById('nightBottomInfo');

            if (jeNocnyCas && terazMili > nocnyRezimSnoozeDo && !isSettingsModeActive) {
                bodyEl.classList.add('full-night-mode');
                
                let radioNocturnalText = "";
                if (currentPlayingType && currentPlayingType !== "none") {
                    radioNocturnalText = `  •  📻 ${currentPlayingType.toUpperCase()}`;
                }
                
                // Pridané zobrazovanie mena oslávenca priamo do riadku noci
                let meninyNocturnalText = dnesneMeno ? `${dnesneMeno}  •  ` : "";
                
                if (bottomInfoEl) {
                    bottomInfoEl.innerHTML = `${meninyNocturnalText}${dniDlhe[now.getDay()]} ${now.getDate()}.${now.getMonth() + 1}.${radioNocturnalText}`;
                }
            } else {
                bodyEl.classList.remove('full-night-mode');
            }
            // --- INTEGRÁCIA AUDIO WATCHDOGU ---
            if (currentPlayingType !== "" && currentPlayingType !== "none" && !audio.paused) {
                
                // Ak sa čas streamu rovná tomu z predchádzajúcej sekundy
                if (audio.currentTime === watchdogPoslednyCas) {
                    watchdogPocitadloZaseknutia++;
                    
                    // Ak zásek trvá už 4 sekundy, ideme reštartovať
                    if (watchdogPocitadloZaseknutia >= 4) {
                        console.log("Watchdog: Detekovaný zásek streamu. Reštartujem...");
                        document.getElementById('lblTrack').textContent = "Obnovujem spojenie...";
                        
                        const aktualnaUrl = audio.src;
                        
                        // Tvrdý reštart sieťového prenosu
                        audio.pause();
                        audio.src = "";
                        audio.load();
                        
                        // Opätovné nakopnutie po vyčistení
                        setTimeout(() => {
                            audio.src = aktualnaUrl;
                            audio.play()
                                .then(() => {
                                    document.getElementById('lblTrack').textContent = "Práve hrá";
                                })
                                .catch(() => {
                                    document.getElementById('lblTrack').textContent = "Obnova zlyhala, stream offline";
                                });
                        }, 500);
                        
                        watchdogPocitadloZaseknutia = 0;
                    }
                } else {
                    // Stream žije a čas beží, resetujeme počítadlo hrozieb
                    watchdogPoslednyCas = audio.currentTime;
                    watchdogPocitadloZaseknutia = 0;
                }
            } else {
                // Rádio je vypnuté alebo pozastavené, strážny pes odpočíva
                watchdogPoslednyCas = -1;
                watchdogPocitadloZaseknutia = 0;
            }
        }

        async function fetchNamedayData() {
            const now = new Date();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            try {
                const response = await fetch('https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv');
                const text = await response.text();
                for (let line of text.split('\n')) {
                    if (line.includes(`${mm}-${dd}`)) {
                        let povodneMeno = line.split(/[;,]/)[1].trim();
                        
                        // ZÁKLADNÉ NASTAVENIE PREMENNEJ
                        dnesneMeno = povodneMeno; 

                        // ELEMENTY PRE ZOBRAZENIE
                        const nameBox = document.getElementById('nameBox');
                        const bigNameday = document.getElementById('bigNameday');

                        // RESET ŠTÝLOV (aby neostalo staré podfarbenie z predchádzajúceho dňa)
                        nameBox.style.color = "#ff9f0a";
                        nameBox.style.background = "transparent";
                        nameBox.style.padding = "0";
                        nameBox.style.borderRadius = "0";
                        bigNameday.style.color = "#ff9f0a";

                        // KONTROLA A ZVÝRAZNENIE PODĽA SKUPÍN
                        if (RODINA.includes(povodneMeno)) {
                            dnesneMeno = `❤️ ${povodneMeno}`;
                            nameBox.style.color = "#ff3b30"; // Červená pre rodinu
                            bigNameday.style.color = "#ff3b30";
                        } 
                        else if (MOJE_MENA.includes(povodneMeno)) {
                            dnesneMeno = `⭐ ${povodneMeno}`;
                            // Zvýraznenie v hornom riadku jemným oranžovým pozadím (kapsula)
                            nameBox.style.background = "#ff9f0a22";
                            nameBox.style.padding = "2px 8px";
                            nameBox.style.borderRadius = "6px";
                            nameBox.style.color = "#ff9f0a";
                        } 
                        else if (SPOLUZIACI.includes(povodneMeno)) {
                            dnesneMeno = `🎓 ${povodneMeno}`;
                            nameBox.style.color = "#5ac8fa"; // Modrá pre spolužiakov
                            bigNameday.style.color = "#5ac8fa";
                        } 
                        else if (KOLEGOVIA.includes(povodneMeno)) {
                            dnesneMeno = `💼 ${povodneMeno}`;
                            nameBox.style.color = "#34c759"; // Zelená pre kolegov
                            bigNameday.style.color = "#34c759";
                        }

                        // ZÁPIS DO STRÁNKY
                        nameBox.textContent = dnesneMeno;
                        bigNameday.textContent = dnesneMeno;
                        
                        runClockEngine(); // Aktualizácia spodného panelu noci
                        break;
                    }
                }
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', () => {
            runClockEngine();
            setInterval(runClockEngine, 1000);
            fetchNamedayData();
            renderSidebarFavorites();
            inicializujPlochuNastaveni();

            const savedType = localStorage.getItem('kiosk_last_radio_type');
            if (savedType) {
                document.getElementById('lblStation').textContent = "STANDBY";
                document.getElementById('lblTrack').textContent = `Naposledy: ${savedType.toUpperCase()}`;
            }
        });

        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
