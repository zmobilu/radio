<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="📻">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>Tvoje radio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>">
    
    <link class="apple-touch-icon" href="https://raw.githubusercontent.com/zmobilu/assets/main/kiosk-ikona.png">
    <meta property="og:image" content="https://raw.githubusercontent.com/zmobilu/assets/main/kiosk-ikona.png">
    
    <style>
        /* --- CENTRÁLNE RIADENÁ FARBA NOCNÉHO REŽIMU --- */
        :root {
            --night-color: #ffff00;
        }

        /* --- RESET A ZÁKLADNÉ NASTAVENIE --- */
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; height: 100vh; width: 100vw;
            overflow: hidden; box-sizing: border-box; -webkit-user-select: none; user-select: none;
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
        }
        
        /* --- PERMANENTNÉ UKOTVENIE NASTAVENÍ VPRAVO HORE --- */
        .btn-settings { 
            position: absolute !important;
            top: 10px !important;
            right: 15px !important;
            z-index: 9999 !important;
            background: #111 !important; 
            border: 1px solid #222 !important; 
            color: #666; 
            font-size: 20px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 44px; 
            height: 44px; 
            border-radius: 50%;
            margin: 0 !important;
            transition: color 0.2s, background 0.2s, border-color 0.2s; 
        }
        .btn-settings.active { color: #ff9f0a; border-color: #ff9f0a; background: #1a1a1a; }

        /* --- HLAVNÁ ROZDELENÁ PLOCHA --- */
        .workspace-container { display: flex; flex: 1; width: 100vw; overflow: hidden; }

        /* Ľavá sekcia: 6 obľúbených položiek (35%) */
        .favorites-sidebar {
            width: 35%; background: #050505; border-right: 1px solid #111;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr);
            gap: 6px; padding: 6px; box-sizing: border-box;
            padding-left: calc(6px + env(safe-area-inset-left));
        }
        .fav-card {
            background: #111; border: 1px solid #222; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; padding: 6px; box-sizing: border-box; position: relative; overflow: hidden;
            transition: transform 0.1s, border-color 0.15s;
        }
        .fav-card:not(.empty):active { transform: scale(0.97); }
        .fav-card.playing { border: 2px solid #ff9f0a !important; background: #151515; }
        .fav-card img { width: 75%; height: 75%; object-fit: contain; }
        .fav-card i { font-size: 30px; }
        .fav-card span { font-size: 11px; font-weight: 600; text-transform: uppercase; text-align: center; margin-top: 2px; }
        
        .fav-card.empty { border: 1px dashed #222; background: transparent; cursor: default; }
        .fav-card.empty i { color: #333; font-size: 22px; }

        /* Pravá sekcia: Hlavný obsah alebo nastavenia (65%) */
        .main-content-area { width: 65%; background: #000; position: relative; overflow: hidden; }
        
        /* --- PROFI DIZAJN VEĽKÝCH HODÍN --- */
        .placeholder-view {
            display: flex; width: 100%; height: 100%; flex-direction: column;
            align-items: center; justify-content: center; background: #000; box-sizing: border-box;
            padding-right: env(safe-area-inset-right);
        }
        .big-clock-time {
            font-size: 16vw; font-weight: 700; line-height: 0.9; letter-spacing: -4px;
            display: flex; align-items: baseline; transform: scaleY(1.05); cursor: pointer;
        }
        .big-clock-hours { color: #fff; font-weight: 700; }
        .big-clock-minutes { color: #fff; font-weight: 200; margin-left: 2px; }
        .big-clock-date-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 2px; margin-top: 15px;
        }
        .big-clock-date {
            font-size: 2.8vw; font-weight: 300; color: #ccc; text-transform: uppercase; letter-spacing: 1px;
        }
        .big-clock-nameday {
            font-size: 2.2vw; font-weight: 400; color: #ff9f0a; letter-spacing: 0.5px; margin-top: 2px;
        }

        /* --- ZÚŽENÝ EXTRA KOMPAKTNÝ PANEL BEZ TEXTOV --- */
        .settings-night-panel {
        background: #0d0d0d; 
        padding: 8px; 
        border-bottom: 2px solid #1a1a1a;
        display: flex; 
        /* ZMENA: Zapneme automatické zalamovanie a usporiadanie pod seba */
        flex-wrap: wrap; 
        flex-direction: row; 
        gap: 8px; 
        box-sizing: border-box; 
        justify-content: space-between;
        }
        .settings-night-row { 
        display: flex; 
        align-items: center; 
        background: #151515; 
        /* ZMENA: Kompaktnejší padding pre úsporu miesta */
        padding: 4px 8px; 
        border-radius: 8px; 
        border: 1px solid #222; 
        gap: 6px; 
        flex: 1; 
        /* ZMENA: Nastavíme minimálnu šírku, aby sa prvky pekne zalomili do dvoch riadkov */
        min-width: calc(50% - 8px); 
        height: 42px; /* Jednotná výška pre všetky boxy */
        justify-content: center;
        box-sizing: border-box;
        }
        .settings-night-row i.label-icon { font-size: 14px; color: #666; width: 16px; text-align: center; }
        .settings-night-row button { background: #222; color: #fff; border: 1px solid #444; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .color-picker-group { display: flex; gap: 5px; }
        .color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; box-sizing: border-box; }
        .color-dot.active-color { border-color: #fff !important; transform: scale(1.1); }

        /* Mriežka všetkých rádií v režime nastavení */
        .settings-grid-view {
            display: none; width: 100%; height: 100%; overflow-y: auto;
            padding: 10px; box-sizing: border-box; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px; align-content: start; background: #090909;
            padding-right: calc(10px + env(safe-area-inset-right));
        }
        .cfg-mini-card {
            background: #151515; border: 1px solid #252525; border-radius: 10px;
            aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 6px; cursor: pointer; box-sizing: border-box; position: relative;
        }
        .cfg-mini-card img { width: 60%; height: 60%; object-fit: contain; }
        .cfg-mini-card i { font-size: 22px; }
        .cfg-mini-card span { font-size: 9px; text-transform: uppercase; font-weight: 600; text-align: center; color: #888; margin-top: 3px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .cfg-mini-card.selected { border: 3px solid #ff9f0a !important; background: #1a1a1a; }
        .cfg-mini-card.selected span { color: #ff9f0a; }

        .settings-label-separator {
            grid-column: 1 / -1; font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.5px; color: #555; margin: 12px 0 2px 4px;
            font-weight: 700; border-bottom: 1px solid #1a1a1a; padding-bottom: 3px;
        }
    
        #nightBottomInfo { display: none; }

        /* --- STYLING PRE FILTROVANIE CELOOBRAZOVKOVÉHO NOČNÉHO REŽIMU --- */
        body.full-night-mode .favorites-sidebar,
        body.full-night-mode .big-clock-date-wrapper,
        body.full-night-mode .btn-settings { /* <--- PRIDANÝ TENTO RIADOK */
            display: none !important;
        }
        body.full-night-mode .workspace-container { width: 100vw; height: 100vh; }
        body.full-night-mode .main-content-area { width: 100vw; height: 100vh; }
        body.full-night-mode .placeholder-view {
            width: 100vw !important; 
            height: 100vh !important; 
            transform: translateY(-6dvh) !important; /* Zmenené z -3dvh na -6dvh pre viditeľnejší posun hodín nahor */
            justify-content: center !important; 
            align-items: center !important; 
            padding: 0 !important;
        }
        body.full-night-mode .big-clock-time {
            font-size: 28vw !important; letter-spacing: -2px !important; margin: 0 !important;
        }
        body.full-night-mode .big-clock-hours,
        body.full-night-mode .big-clock-minutes,
        body.full-night-mode #nightBottomInfo {
            color: var(--night-color) !important;
        }
        body.full-night-mode #nightBottomInfo {
        display: block !important; 
        position: absolute !important; 
        bottom: 5vh !important;         /* Posunuté o chlp nižšie, aby vznikla bezpečná medzera od obrovských číslic */
        padding-bottom: env(safe-area-inset-bottom) !important;
        font-size: 4.5vw !important;    /* Výrazne zväčšené z pôvodných 2.8vw */
        font-weight: 500;               /* Stredne hrubé písmo – ideálne na čítanie rozostreným zrakom */
        letter-spacing: 1px; 
        opacity: 1;                     /* Plný jas bez stlmenia pre maximálny kontrast v tme */
        text-align: center;
        width: 100%;                    /* Poistka pre presné vycentrovanie na stred */
        left: 0;
        }

        @media (min-width: 768px) {
            .favorites-sidebar { gap: 10px; padding: 10px; }
            .fav-card span { font-size: 12px; }
            .settings-night-panel { padding: 10px; gap: 10px; }
            .color-dot { width: 22px; height: 22px; }
            }
        /* --- AUTOMATICKÉ PREKRESLENIE PRE REŽIM NA VÝŠKU --- */
        @media (orientation: portrait) {
            
            /* OPRAVA syntaxe: Tieto tri riadky musia byť samostatne, nie vnútri .nav-left-info */
            .weather-big-icon { font-size: 55px !important; }
            .weather-big-temp { font-size: 48px !important; }
            .forecast-temp { font-size: 15px !important; }
            
            /* Hlavný kontajner otočíme z horizontálneho na vertikálny smer */
            .workspace-container {
                flex-direction: column;
            }

            /* Ľavá sekcia (teraz spodná): Rádia berú celú šírku a cca 30% výšky obrazovky */
            .favorites-sidebar {
                width: 100vw;
                height: auto;
                flex-shrink: 0;
                order: 2; /* Presunie blok rádií pod hodiny */
                grid-template-columns: repeat(3, 1fr); /* 3 stĺpce */
                grid-template-rows: repeat(2, 1fr);    /* 2 riadky */
                border-right: none;
                border-top: 1px solid #111;
                gap: 8px;
                padding: 8px;
                padding-bottom: calc(8px + env(safe-area-inset-bottom));
                padding-left: calc(8px + env(safe-area-inset-left));
                padding-right: calc(8px + env(safe-area-inset-right));
            }

            /* Pravá sekcia (teraz horná): Hodiny a nastavenia obsadia zvyšok (cca 70% výšky) */
            .main-content-area {
                width: 100vw;
                flex: 1;
                order: 1; /* Ponechá hodiny navrchu */
            }

            /* Prispôsobenie veľkých hodín pre vertikálny režim */
            .big-clock-time {
                font-size: 26vw; /* Zväčšíme čísla na výšku, keďže máme viac miesta */
            }
            
            .big-clock-date {
                font-size: 4.5vw;
            }
            
            .big-clock-nameday {
                font-size: 4vw;
            }
               /* Kompenzácia priestoru pre mriežku rádií, aby sa pod lištu neschovali */
            .favorites-sidebar {
                padding-bottom: calc(65px + env(safe-area-inset-bottom)) !important;
            }
            /* Zabezpečí, že sa mriežka rádií pri pretiahnutí neprekryje so zdvihnutou spodnou lištou */
            .settings-grid-view {
                padding-bottom: calc(130px + env(safe-area-inset-bottom)) !important;
            }
            /* Upraví flexibilitu hodín, aby v režime na výšku netlačili komponenty pod seba */
            .placeholder-view {
                justify-content: space-evenly !important;
                padding-bottom: 20px;
            }
        } 

        /* --- OCHRANA PROTI VYPAĽOVANIU (PIXEL SHIFTING) --- */
        @keyframes antiBurnIn {
            0%   { transform: translate(0, 0); }
            20%  { transform: translate(2px, -3px); }
            40%  { transform: translate(-3px, 2px); }
            60%  { transform: translate(3px, 3px); }
            80%  { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }

        /* Aktivuje sa iba v nočnom režime na celý svietiaci stred */
        body.full-night-mode .placeholder-view {
            animation: antiBurnIn 300s infinite linear;
        }
        /* --- DETAILNÉ ZOBRAZENIE POČASIA NA PLOCHE --- */
        .weather-detail-view {
            display: none; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            box-sizing: border-box;
            padding: 10px 20px; 
            padding-right: env(safe-area-inset-right); 
            cursor: pointer;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1; /* Podriadené tlačidlu nastavení */
        }
        /* Ľavý stĺpec s predpoveďou (Dnes / Zajtra nad sebou) */
        .weather-left-column {
            width: 42%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            justify-content: center;
        }
        .weather-forecast-box {
            flex: 1; 
            background: #000; /* Čisto čierne pozadie ako na koncepte */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 5px;
            box-sizing: border-box;
        }
        .forecast-label { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
        .forecast-icon { 
            font-size: 7vw; /* Dynamická veľkosť podriadená obrazovke */
            margin: 2px 0; 
            line-height: 1; 
        }
        .forecast-temp { font-size: 3.5vw; font-weight: 600; color: #ccc; }
        
        /* Pravý dominantný stĺpec s aktuálnym počasím */
        .weather-right-column {
            width: 58%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        .weather-big-city { font-size: 28px; font-weight: 700; color: #ffa500; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 2px dashed #444; padding-bottom: 2px; margin-bottom: 8px; }
        /* Odstránili sme .weather-big-city zo štýlov, nápis v HTML zmažeme */
        .weather-big-icon { 
            font-size: 13vw; /* Dynamická veľkosť hlavnej ikony */
            line-height: 1; 
            margin: 2px 0; 
        }
        .weather-big-temp { 
            font-size: 11vw; /* Dynamická veľkosť teploty */
            font-weight: 700; 
            color: #ffa500; 
            line-height: 0.9; 
        }
        .weather-sub-info { display: flex; gap: 30px; font-size: 4vw; font-weight: 600; margin-top: 12px; }
        .weather-sub-tomorrow { color: #ff4500; }
        .weather-sub-humidity { color: #aaa; }
        
        /* --- INTEGRÁCIA NOVÉHO METEO REŽIMU --- */
        body.weather-active-mode .fav-card, 
        body.weather-active-mode .big-clock-time, 
        body.weather-active-mode .big-clock-date-wrapper { 
            display: none !important; 
        }

        /* Transformácia ľavého panelu na Aktuálne počasie */
        body.weather-active-mode .favorites-sidebar {
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
            background: #000 !important;
            padding: 15px 10px !important;
        }

        /* Kontajnery pre hodinový graf a predpoveď na pravej strane */
        .weather-right-graph-area {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            justify-content: space-between;
        }
        body.weather-active-mode .weather-right-graph-area {
            display: flex !important;
        }

        .chart-container-new {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 48dvh;
            width: 100%;
            margin-top: 10px;
        }

        .extended-strip-new {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            width: 100%;
            height: 18dvh;
            margin-bottom: 5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
</head>
<body id="mainBody">

    <audio id="audioPlayer" preload="none" playsinline></audio>

    <div class="workspace-container">
        
        <aside class="favorites-sidebar" id="favSidebarContainer">
            <div class="weather-left-live-view" id="weatherLeftLive" style="display: none; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; width: 100%;">
                <div style="text-align: center; margin-top: 5px;">
                    <span id="weatherMainCityClick" style="color: #ff9f0a; font-size: 2.8vw; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 2px dashed #ff9f0a; cursor: pointer;">---</span>
                    <div id="weatherMainIcon" style="font-size: 9vw; margin: 10px 0; line-height: 1;">☀️</div>
                    <div id="weatherMainTemp" style="font-size: 8vw; font-weight: 700; line-height: 0.9;">--°C</div>
                    <div style="display: flex; gap: 20px; font-size: 2.2vw; font-weight: 600; margin-top: 12px; justify-content: center;">
                        <span id="weatherMainApparent" style="color: #ff4500;">--°</span>
                        <span id="weatherMainHumidity" style="color: #aaa;"><i class="fa-solid fa-droplet"></i> --%</span>
                    </div>
                </div>
                
                <div style="display: flex; gap: 6px; width: 100%; margin-bottom: 5px;">
                    <div class="weather-forecast-box" id="boxMiniDnes" style="flex: 1; background: #111; border: 1px solid #222; border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding: 6px; cursor: pointer;">
                        <span style="font-size: 11px; font-weight: 700; color: #fff;">DNES</span>
                        <span id="leftMiniIconDnes" style="font-size: 4vw; margin: 2px 0;">☀️</span>
                        <span id="leftMiniTempDnes" style="font-size: 2vw; font-weight: 600; color: #ccc;">--° / --°</span>
                    </div>
                    <div class="weather-forecast-box" id="boxMiniZajtra" style="flex: 1; background: #111; border: 1px solid #222; border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding: 6px; cursor: pointer;">
                        <span style="font-size: 11px; font-weight: 700; color: #fff;">ZAJTRA</span>
                        <span id="leftMiniIconZajtra" style="font-size: 4vw; margin: 2px 0;">☀️</span>
                        <span id="leftMiniTempZajtra" style="font-size: 2vw; font-weight: 600; color: #ccc;">--° / --°</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content-area">
            <button class="btn-settings" id="settingsToggleBtn" onclick="toggleSettingsMode(); event.stopPropagation();" title="Správa obľúbených">
                <i class="fa-solid fa-gear"></i>
            </button>
            
            <div class="placeholder-view" id="rightPlaceholder">
                <div class="big-clock-time" onclick="handleBigClockClick()">
                    <span class="big-clock-hours" id="bigHours">00</span>
                    <span class="big-clock-minutes" id="bigMinutes">00</span>
                </div>
                <div class="big-clock-date-wrapper">
                    <span class="big-clock-date" id="bigDate">Pondelok, 1.1.</span>
                    <span class="big-clock-nameday" id="bigNameday">Dnes má meniny: ---</span>
                </div>
                
                <div id="mainWeatherWidget" onclick="toggleWeatherView(); event.stopPropagation();" style="margin-top: 12px; font-size: 3.5vw; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <span id="mainWeatherIcon">☀️</span>
                    <span id="mainWeatherTemp">--°C</span>
                </div>

                <div id="nightBottomInfo"></div>
            </div>

            <div class="weather-right-graph-area" id="weatherRightGraphArea" onclick="toggleWeatherView();">
                <div class="chart-container-new" id="hourlyChartContainerNew"></div>

                <div class="extended-strip-new" id="extendedForecastContainerNew"></div>
            </div>

           

            <div class="settings-grid-view" id="settingsGridView" onclick="resetSettingsTimer()">                
                <div class="settings-night-panel" style="grid-column: 1 / -1;" onclick="resetSettingsTimer()">
                    <div class="settings-night-row">
                        <i class="fa-solid fa-clock label-icon" title="Trvanie noci"></i>
                        <div>
                            <button onclick="zmenNastavenieCasu('od'); event.stopPropagation();" id="set-night-from">20:00</button>
                            <span style="color: #444; margin: 0 2px;">-</span>
                            <button onclick="zmenNastavenieCasu('do'); event.stopPropagation();" id="set-night-to">05:20</button>
                        </div>
                    </div>
                    
                    <div class="settings-night-row">
                        <i class="fa-solid fa-bed label-icon" title="Prerušenie noci (Snooze)"></i>
                        <button onclick="zmenDobuOdkladu(); event.stopPropagation();" id="set-snooze-time">1 min</button>
                    </div>
                    <div class="settings-night-row">
                        <i class="fa-solid fa-palette label-icon" title="Farba nočného zobrazenia"></i>
                        <div class="color-picker-group">
                            <div onclick="nastavFarbuNoci('#ffff00', this); event.stopPropagation();" class="color-dot" style="background: #ffff00;"></div>
                            <div onclick="nastavFarbuNoci('#eb0028', this); event.stopPropagation();" class="color-dot" style="background: #eb0028;"></div>
                            <div onclick="nastavFarbuNoci('#ffa500', this); event.stopPropagation();" class="color-dot" style="background: #ffa500;"></div>
                            <div onclick="nastavFarbuNoci('#32CD32', this); event.stopPropagation();" class="color-dot" style="background: #32CD32;"></div>
                            <div onclick="nastavFarbuNoci('#ffffff', this); event.stopPropagation();" class="color-dot" style="background: #ffffff;"></div>

            function vykresliNovyGraf(targetDayIndex) {
            const chartContainer = document.getElementById('hourlyChartContainerNew');
            if (!chartContainer || !window.weatherDataBackup) return;
            chartContainer.innerHTML = '';

            // Globálna pomocná funkcia pre farby teploty v grafe
            function ziskajFarbuPreGraf(t) {
                if (t < 0) return '#00bfff';
                if (t < 10) return '#87CEEB';
                if (t < 22) return '#98FB98';
                if (t < 28) return '#ffa500';
                return '#ff4500';
            }

            // Pomocná funkcia na ikony pre hodinový graf
            function ziskajIkonuPreGraf(wCode) {
                if (wCode >= 1 && wCode <= 3) return "⛅";
                if (wCode >= 45 && wCode <= 48) return "🌫️";
                if ((wCode >= 51 && wCode <= 67) || (wCode >= 80 && wCode <= 82)) return "🌧️";
                if ((wCode >= 71 && wCode <= 77) || (wCode >= 85 && wCode <= 86)) return "❄️";
                if (wCode >= 95 && wCode <= 99) return "⛈️";
                return "☀️";
            }

            let temps = [], labels = [], codes = [];
            const currentHourIndex = new Date().getHours();

            if (targetDayIndex === null || targetDayIndex === 0) {
                // Nasledujúcich 12 hodín odteraz
                temps = window.weatherDataBackup.hourly.temperature_2m.slice(currentHourIndex, currentHourIndex + 12);
                codes = window.weatherDataBackup.hourly.weather_code.slice(currentHourIndex, currentHourIndex + 12);
                for (let idx = 0; idx < 12; idx++) {
                    labels.push(idx === 0 ? 'Teraz' : String((currentHourIndex + idx) % 24));
                }
            } else {
                // Celý zvolený deň (kroky po 2 hodinách)
                const startHour = targetDayIndex * 24;
                for (let step = 0; step < 12; step++) {
                    const offset = startHour + (step * 2);
                    temps.push(window.weatherDataBackup.hourly.temperature_2m[offset]);
                    codes.push(window.weatherDataBackup.hourly.weather_code[offset]);
                    labels.push(String(step * 2));
                }
            }

            const maxT = Math.max(...temps);
            const minT = Math.min(...temps);
            const range = (maxT - minT) || 1;

            temps.forEach((temp, idx) => {
                if (temp === undefined) return;
                const pct = ((temp - minT) / range) * 55 + 15; // Výška stĺpca v %
                const colBackground = `linear-gradient(to top, rgba(255,255,255, 0.08), ${ziskajFarbuPreGraf(temp)})`;
                
                const hodinaCode = codes[idx] !== undefined ? codes[idx] : 0;
                const hodinaIcon = ziskajIkonuPreGraf(hodinaCode);

                const column = document.createElement('div');
                column.style.cssText = `display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; width: 7.5%;`;
                column.innerHTML = `
                    <span style="font-size: 4vw; margin-bottom: 2px;">${hodinaIcon}</span> 
                    <span style="font-size: 12px; font-weight: 600; color: ${ziskajFarbuPreGraf(temp)}; margin-bottom: 4px;">${Math.round(temp)}°</span>
                    <div style="width: 100%; height: ${pct}%; background: ${colBackground}; border-radius: 6px 6px 0 0; border: 1px solid #222; border-bottom: none;"></div>
                    <span style="font-size: 11px; color: #fff; margin-top: 5px; font-weight: 500;">${labels[idx]}</span>
                `;
                chartContainer.appendChild(column);
            });

            // --- VIZUÁLNE ZVÝRAZNENIE VYBRANÉHO DŇA ---
            document.querySelectorAll('.weather-forecast-box, .extended-strip-new div').forEach(el => {
                el.style.borderColor = '#222';
                el.style.background = '#111';
            });
            
            if (targetDayIndex === 0 || targetDayIndex === null) {
                const dnesBox = document.getElementById('boxMiniDnes');
                if (dnesBox) { dnesBox.style.borderColor = '#ff9f0a'; dnesBox.style.background = '#151515'; }
            } else if (targetDayIndex === 1) {
                const zajtraBox = document.getElementById('boxMiniZajtra');
                if (zajtraBox) { zajtraBox.style.borderColor = '#ff9f0a'; zajtraBox.style.background = '#151515'; }
            }
        }
        // --- MANAŽMENT PANELU NASTAVENÍ NOČNÉHO REŽIMU ---
        function inicializujPlochuNastaveni() {
            const elFrom = document.getElementById('set-night-from');
            const elTo = document.getElementById('set-night-to');
            const elSnooze = document.getElementById('set-snooze-time');

            if (elTo) elTo.textContent = cfgNocDo;
            if (elSnooze) elSnooze.textContent = cfgSnoozeMin + " min";

        function manualnyNocturnalToggle() {
            // Ak už beží klasická noc podľa časovača, kliknutie ignorujeme
            const now = new Date();

            const [odH, odM] = cfgNocOd.split(':').map(Number);
            const [doH, doM] = cfgNocDo.split(':').map(Number);
            const casOd = odH * 60 + odM;
            const casDo = doH * 60 + doM;
            let jeNocnyCas = (casOd > casDo) 
                ? (aktualnyCasVMinutach >= casOd || aktualnyCasVMinutach < casDo)
                : (aktualnyCasVMinutach >= casOd && aktualnyCasVMinutach < casDo);

            if (jeNocnyCas) return; // Automatika už beží, netreba prepínať manuálne

            // Prepíname stav manuálnej noci (zapnúť / vypnúť)
            manualnaNocAktivna = !manualnaNocAktivna;
            
            // Resetujeme snooze, ak by bol aktívny
            nocnyRezimSnoozeDo = 0; 
            
            // Okamžite prekreslíme obrazovku
            runClockEngine();
        }

        function zmenNastavenieCasu(typ) {
            let povodny = (typ === 'od') ? cfgNocOd : cfgNocDo;
            let novy = prompt(`Zadaj čas pre ${typ === 'od' ? 'ZAČIATOK' : 'KONIEC'} noci (HH:MM):`, povodny);
            if (novy && /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/.test(novy)) {
                if (novy.length === 4 && novy.indexOf(':') === 1) novy = "0" + novy;
                if (typ === 'od') { cfgNocOd = novy; localStorage.setItem('cfg_night_from', novy); } 
                else { cfgNocDo = novy; localStorage.setItem('cfg_night_to', novy); }
                inicializujPlochuNastaveni();
                runClockEngine();
            }
            resetSettingsTimer();
        }
        

        function zmenDobuOdkladu() {
            let novaDoba = prompt("Zadaj dobu prebudenia hodín v minútach (Snooze):", cfgSnoozeMin);
            if (novaDoba && !isNaN(novaDoba) && parseInt(novaDoba) > 0) {
                cfgSnoozeMin = parseInt(novaDoba);
                localStorage.setItem('cfg_snooze_min', cfgSnoozeMin);
                inicializujPlochuNastaveni();
            }
            resetSettingsTimer();
        }

        function nastavFarbuNoci(hexFarba, element) {
            cfgFarbaNoci = hexFarba;
            localStorage.setItem('cfg_night_color', hexFarba);
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active-color'));
            if(element) element.classList.add('active-color');
            document.documentElement.style.setProperty('--night-color', hexFarba);
            runClockEngine();
            resetSettingsTimer();
        }
        function zmenNastavenieMesta() {
            let navrhMesta = prompt("Zadaj názov mesta (napr. Bratislava, Kosice, Praha, Rim):", cfgMestoNazov);
            
            if (navrhMesta && navrhMesta.trim() !== "") {
                vyhladajMestoPodlaTextu(navrhMesta.trim());
            }
            resetSettingsTimer();
        }

        // Spoločná funkcia pre prompt aj pre kliknutie na históriu
        function vyhladajMestoPodlaTextu(cisteMesto) {
            fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cisteMesto)}&count=1&language=sk&format=json`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.results && data.results.length > 0) {
                        const najdene = data.results[0];
                        
                        cfgLat = najdene.latitude;
                        cfgLon = najdene.longitude;
                        cfgMestoNazov = najdene.name;
                        
                        localStorage.setItem('cfg_weather_lat', cfgLat);
                        localStorage.setItem('cfg_weather_lon', cfgLon);
                        localStorage.setItem('cfg_weather_name', cfgMestoNazov);
                        
                        // Aktualizácia histórie top 3 miest
                        cfgHistoriaMest = cfgHistoriaMest.filter(m => m.toLowerCase() !== cfgMestoNazov.toLowerCase());
                        cfgHistoriaMest.unshift(cfgMestoNazov);
                        if (cfgHistoriaMest.length > 3) cfgHistoriaMest.pop();
                        localStorage.setItem('cfg_weather_history', JSON.stringify(cfgHistoriaMest));
                        
                        aktualizujTlacidloMesta();
                        fetchWeatherData();
                    } else {
                        alert(`Mesto "${cisteMesto}" sa nenašlo.`);
                    }
                })
                .catch(e => console.log("Chyba geokódovania."));
        }

        // Funkcia, ktorá sa spustí hneď, ako ťukneš na rýchle tlačidlo histórie
        function klikolNaHistoriuMest(mesto, event) {
            if (event) event.stopPropagation(); // Zabráni zavretiu menu nastavení
            vyhladajMestoPodlaTextu(mesto);
            resetSettingsTimer();
        }

        function aktualizujTlacidloMesta() {
            const btn = document.getElementById('set-weather-coords');
            if (btn) {
                btn.textContent = `Mesto: ${cfgMestoNazov}`;
            }

            // VYGENERUJE KLIKATEĽNÉ TLAČIDLÁ HISTÓRIE
            const historyContainer = document.getElementById('weather-history-buttons');
            if (historyContainer) {
                historyContainer.innerHTML = "";
                
                cfgHistoriaMest.forEach(mesto => {
                    // Vytvoríme malé decentné tlačidlo pre každé zapamätané mesto
                    const histBtn = document.createElement('button');
                    histBtn.style.cssText = "background: #252525; color: #aaa; border: 1px solid #333; padding: 2px 6px; border-radius: 4px; font-size: 9px; cursor: pointer; font-weight: normal; margin: 0 2px;";
                    histBtn.textContent = mesto;
                    
                    // Ak je to aktuálne zobrazené mesto, jemne ho zvýrazníme oranžovou obrubou
                    if (mesto.toLowerCase() === cfgMestoNazov.toLowerCase()) {
                        histBtn.style.borderColor = "#ff9f0a";
                        histBtn.style.color = "#fff";
                    }
                    
                    histBtn.onclick = (e) => klikolNaHistoriuMest(mesto, e);
                    historyContainer.appendChild(histBtn);
                });
            }
        }

        // --- AUTOMATICKÉ ZATVÁRANIE NASTAVENÍ (10 SEKÚND) ---
        function resetSettingsTimer() {
            if (!isSettingsModeActive) return;
            clearTimeout(settingsTimeout);
            settingsTimeout = setTimeout(() => {
                if (isSettingsModeActive) {
                    toggleSettingsMode();
                }
            }, 10000); // 10 sekúnd bez akcie zatvorí režim nastavení
        }

        // --- RENDER ĽAVÉHO PANELU ---
        function renderSidebarFavorites() {
            const container = document.getElementById('favSidebarContainer');
            if(!container) return;
            container.innerHTML = "";

            for (let i = 0; i < 6; i++) {
                const id = slotFavorites[i];
                const item = DATABASE.find(d => d.id === id);
                const card = document.createElement('div');
                
                if (item && id !== null) {
                    card.className = "fav-card";
                    if (currentPlayingType === item.id) card.classList.add("playing");
                    card.setAttribute("style", item.style);
                    card.onclick = () => handleFavCardClick(item);

                    if (item.img) {
                        card.innerHTML = `<img src="${item.img}" alt="${item.name}">`;
                    } else if (item.icon) {
                        card.innerHTML = `<i class="${item.icon}" style="color:${item.color}"></i><span>${item.name}</span>`;
                    }
                } else {
                    card.className = "fav-card empty";
                    card.innerHTML = `<i class="fa-solid fa-plus"></i>`;
                }
                container.appendChild(card);
            }
        }

        // --- RENDER CONFIG mriežky ---
        function renderSettingsGrid() {
            const grid = document.getElementById('settingsGridView');
            if(!grid) return;
            
            // Zachováme nočný panel na nultej pozícii a vymažeme len staré generované rádiá a separátory pod ním
            const nightPanel = grid.querySelector('.settings-night-panel');
            while (grid.lastChild && grid.lastChild !== nightPanel) {
                grid.removeChild(grid.lastChild);
            }
            
            let currentCategory = "";

            DATABASE.forEach(item => {
                if (item.category !== currentCategory) {
                    currentCategory = item.category;
                    const separator = document.createElement('div');
                    separator.className = "settings-label-separator";
                    separator.textContent = currentCategory;
                    grid.appendChild(separator);
                }

                const card = document.createElement('div');
                card.className = "cfg-mini-card";
                
                const isSelected = slotFavorites.includes(item.id);
                if (isSelected) card.classList.add("selected");

                card.onclick = (e) => { handleChannelSelectionToggle(item.id); e.stopPropagation(); };

                if (item.img) {
                    card.innerHTML = `<img src="${item.img}"><span>${item.name}</span>`;
                } else if (item.icon) {
                    card.innerHTML = `<i class="${item.icon}" style="color:${item.color}"></i><span>${item.name}</span>`;
                }
                grid.appendChild(card);
            });
            
            inicializujPlochuNastaveni();
            aktualizujTlacidloMesta(); 
        }

        function handleChannelSelectionToggle(id) {
            const existingIndex = slotFavorites.indexOf(id);

            if (existingIndex !== -1) {
                slotFavorites[existingIndex] = null;
            } else {
                const freeSlotIndex = slotFavorites.indexOf(null);
                if (freeSlotIndex !== -1) {
                    slotFavorites[freeSlotIndex] = id;
                } else {
                    alert("Všetkých 6 pozícií je plných. Najprv kliknutím uvoľnite niektoré miesto.");
                    return;
                }
            }
            
            localStorage.setItem('kiosk_slots_v2', JSON.stringify(slotFavorites));
            renderSidebarFavorites();
            renderSettingsGrid();
            resetSettingsTimer();
        }

        function toggleSettingsMode() {
            isSettingsModeActive = !isSettingsModeActive;
            const btn = document.getElementById('settingsToggleBtn');
            const placeholder = document.getElementById('rightPlaceholder');
            const gridView = document.getElementById('settingsGridView');
            const weatherView = document.getElementById('weatherRightGraphArea'); // OPRAVENÉ ID

            if (isSettingsModeActive) {
                btn.classList.add('active');
                placeholder.style.display = 'none';
                if (weatherView) weatherView.style.display = 'none'; // Doplnená poistka existencie
                gridView.style.display = 'grid';
                renderSettingsGrid();
                resetSettingsTimer(); 
            } else {
                clearTimeout(settingsTimeout);
                btn.classList.remove('active');
                placeholder.style.display = 'flex';
                gridView.style.display = 'none';
                if (weatherView) weatherView.style.display = 'none';
            }
        }
        function handleFavCardClick(item) {
    if (isSettingsModeActive) return;
    if (item.url) {
        if (currentPlayingType === item.id) {
            vypniRadio(); // Použijeme novú čistú funkciu
        } else {
            if (item.icon && (item.id === 'spotify' || item.id === 'applemusic' || item.id === 'youtube' || item.id === 'tidal')) {
                triggerExternalApp(item.url, item.id);
            } else {
                playRadio(item.url, item.id);
            }
        }
    }
}

        // --- AUDIO ENGINE ---
        function playRadio(url, id) {
    audio.pause();
    audio.src = url; // Priame priradenie novej URL
    audio.load();    // Prehliadač pripraví nový stream

    currentPlayingType = id;
    localStorage.setItem('kiosk_last_radio_url', url);
    localStorage.setItem('kiosk_last_radio_type', id);

    audio.volume = 0.8 * (VOLUME_MAP[id] || 1.0);

    audio.play()
    .then(() => {
        renderSidebarFavorites();
        runClockEngine(); 
    })
    .catch((e) => console.log("Stream offline alebo blokovaný", e));
}

       function vypniRadio() {
        audio.pause();
        audio.src = ""; // Desktop potrebuje vidieť vyprázdnenie pred load()
        audio.load();   // Toto na desktope definitívne zabije sieťové pripojenie k streamu
        currentPlayingType = "";
        renderSidebarFavorites();
        runClockEngine();
}

        function adjustVolume(val) {
            audio.volume = (val / 100) * (VOLUME_MAP[currentPlayingType] || 1.0);
        }

        function triggerExternalApp(url, id) {
            audio.pause(); audio.src = ""; currentPlayingType = id;
            renderSidebarFavorites();
            setTimeout(() => { window.location.href = url; }, 300);
        }

        // --- SNOOZE FUNKCIA (KLIK NA VEĽKÉ HODINY) ---
        function handleBigClockClick() {
            if (document.body.classList.contains('full-night-mode')) {
                // OPRAVA: Vynulujeme aj manuálny príznak, aby sa dalo rádio cez deň prebudiť kliknutím na veľké hodiny
                manualnaNocAktivna = false;
                nocnyRezimSnoozeDo = Date.now() + (cfgSnoozeMin * 60 * 1000);
                document.body.classList.remove('full-night-mode');
            }
        }
// --- ENGINE HODÍN, KALENDÁRA A KONTROLY NOČNÉHO REŽIMU ---
        function runClockEngine() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('bigHours').textContent = h;
            document.getElementById('bigMinutes').textContent = m;
            
            // NÁHRADA PRE FORMÁTOVANIE DÁTUMU V runClockEngine()
            const dniDlhe = ['Nedeľa', 'Pondelok', 'Utorok', 'Streda', 'Štvrtok', 'Piatok', 'Sobota'];
            const formatVelky = `${dniDlhe[now.getDay()]}, ${now.getDate()}.${now.getMonth() + 1}.${now.getFullYear()}`;
            
            document.getElementById('bigDate').textContent = formatVelky;

            const aktualnyCasVMinutach = now.getHours() * 60 + now.getMinutes();
            const terazMili = Date.now();

            const [odH, odM] = cfgNocOd.split(':').map(Number);
            const [doH, doM] = cfgNocDo.split(':').map(Number);
            const casOd = odH * 60 + odM;
            const casDo = doH * 60 + doM;

            let jeNocnyCas = (casOd > casDo) 
                ? (aktualnyCasVMinutach >= casOd || aktualnyCasVMinutach < casDo)
                : (aktualnyCasVMinutach >= casOd && aktualnyCasVMinutach < casDo);

            const bodyEl = document.getElementById('mainBody');
            const bottomInfoEl = document.getElementById('nightBottomInfo');

            // REŽIM NOCI: Aktivuje sa, ak je nočný čas ALEBO ak bola zapnutá manuálne
            if ((jeNocnyCas || manualnaNocAktivna) && terazMili > nocnyRezimSnoozeDo && !isSettingsModeActive) {
                bodyEl.classList.add('full-night-mode');
                
                let radioNocturnalText = "";
                if (currentPlayingType && currentPlayingType !== "none") {
                    radioNocturnalText = `   •   📻 ${currentPlayingType.toUpperCase()}`;
                }
                
                // OPRAVA: Odstránenie grafických ikon (srdiečka, hviezdičky...) z mien pre nočný riadok
                let meninyNocturnalText = dnesneMeno ? `${dnesneMeno.replace(/[❤️⭐🎓💼]/g, '').trim()}   •   ` : "";
                
                if (bottomInfoEl) {
                    // Vytiahneme čisté číslo teploty z premennej
                    const lenCisloTeploty = parseInt(aktualnaTeplotaText.replace(/[^0-9.-]/g, ''));
                    const zobrazenieTeploty = isNaN(lenCisloTeploty) ? "" : `   •   ${lenCisloTeploty}°C`;

                    // ZÁPIS DO NOČNÉHO RIADKA: Čistý text preberá farbu hodín, žiadne extra farby ani ikony počasia
                    bottomInfoEl.innerHTML = `${meninyNocturnalText}${dniDlhe[now.getDay()]} ${now.getDate()}.${now.getMonth() + 1}.${zobrazenieTeploty}${radioNocturnalText}`;
                }
            } else {
                bodyEl.classList.remove('full-night-mode');
                // Ak kód zhodil nočný režim (napr. prešiel čas noci), vynulujeme aj manuálny príznak
                if (!jeNocnyCas) manualnaNocAktivna = false;
            }
        }
        // --- PREPÍNANIE HODÍN A DETAILNÉHO POČASIA ---
        function toggleWeatherView() {
            if (isSettingsModeActive) toggleSettingsMode();
            
            const bodyEl = document.getElementById('mainBody');
            const clockView = document.getElementById('rightPlaceholder');
            const graphView = document.getElementById('weatherRightGraphArea');
            const leftWeather = document.getElementById('weatherLeftLive');
            const settingsView = document.getElementById('settingsGridView');

            // Ak je zapnuté, vypneme ho
            if (bodyEl.classList.contains('weather-active-mode')) {
                bodyEl.classList.remove('weather-active-mode');
                if (leftWeather) leftWeather.style.display = 'none';
                if (graphView) graphView.style.display = 'none';
                if (clockView) clockView.style.display = 'flex';
                renderSidebarFavorites(); // Vráti späť obľúbené rádio stanice vľavo
            } else {
                // Zapíname plnohodnotný meteo režim
                if (settingsView) settingsView.style.display = 'none';
                if (clockView) clockView.style.display = 'none';
                bodyEl.classList.add('weather-active-mode');
                if (leftWeather) leftWeather.style.display = 'flex';
                if (graphView) graphView.style.display = 'flex'; // OPRAVA: Explicitne vynútime zobrazenie grafu
                
                // Vytiahneme graf pre aktuálny deň (null znamená "Teraz / Dnes")
                vykresliNovyGraf(null);
            }
        }
        async function fetchNamedayData() {
            const now = new Date();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            try {
                const response = await fetch('https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv');
                const text = await response.text();
                for (let line of text.split('\n')) {
                    if (line.includes(`${mm}-${dd}`)) {
                        let povodneMeno = line.split(/[;,]/)[1].trim();
                        
                        // ZÁKLADNÉ NASTAVENIE PREMENNEJ
                        dnesneMeno = povodneMeno; 

                        // ELEMENTY PRE ZOBRAZENIE
                        const bigNameday = document.getElementById('bigNameday');
                        bigNameday.style.color = "#ff9f0a";

                        // KONTROLA A ZVÝRAZNENIE PODĽA SKUPÍN
                        if (RODINA.includes(povodneMeno)) {
                            dnesneMeno = `❤️ ${povodneMeno}`;
                            bigNameday.style.color = "#ff3b30";
                        } 
                        else if (MOJE_MENA.includes(povodneMeno)) {
                            dnesneMeno = `⭐ ${povodneMeno}`;
                        } 
                        else if (SPOLUZIACI.includes(povodneMeno)) {
                            dnesneMeno = `🎓 ${povodneMeno}`;
                            bigNameday.style.color = "#5ac8fa";
                        } 
                        else if (KOLEGOVIA.includes(povodneMeno)) {
                            dnesneMeno = `💼 ${povodneMeno}`;
                            bigNameday.style.color = "#34c759";
                        }

                        // ZÁPIS DO STRÁNKY
                        bigNameday.textContent = dnesneMeno;
                        
                        runClockEngine(); // Aktualizácia spodného panelu noci
                        break;
                    }
                }
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Načítanie počasia pri štarte a nastavenie aktualizácie každých 15 minút
            fetchWeatherData();
            setInterval(fetchWeatherData, 15 * 60 * 1000);
            runClockEngine();
            setInterval(runClockEngine, 1000);
            fetchNamedayData();
            renderSidebarFavorites();
            inicializujPlochuNastaveni();
            aktualizujTlacidloMesta();
        });

        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

    </script>
